
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#eef7ee;
margin:0;
}

.container{
background:white;
margin:4px;
border-radius:12px;
padding:8px;
}

.title{
text-align:center;
font-size:34px;
font-weight:bold;
margin:8px 0;
}

/* ✅ logout FIX */
.logoutBtn{
position:absolute;
top:6px;
right:6px;
padding:6px 10px;
font-size:12px;
border-radius:8px;
background:#2e7d32;
color:white;
border:none;
width:auto;
}

/* grid */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:4px;
}

/* bottoni SD */
.sdBtn{
height:40px;
border-radius:8px;
border:1px solid #999;
font-size:13px;
display:flex;
align-items:center;
justify-content:center;
background:#f3f3f3;
transition:0.1s;
}

.sdBtn:active{
transform:scale(0.92);
}

.top8{
background:#c8e6c9;
}

/* hcp */
.big{
font-size:48px;
text-align:center;
font-weight:bold;
}

/* stb */
#simBox{
display:flex;
justify-content:center;
gap:15px;
margin:10px;
}

#simBox button{
width:46px;
height:46px;
border-radius:50%;
font-size:20px;
}

#sim{
font-size:22px;
padding:8px 16px;
border-radius:10px;
color:white;
background:#ff9800;
}

/* bottoni */
button{
width:100%;
padding:14px;
margin-top:8px;
border:none;
border-radius:10px;
background:#2e7d32;
color:white;
font-size:18px;
}

.desc{
font-size:14px;
text-align:center;
}
</style>
</head>

<body>

<div class="container" style="position:relative">
<h1 class="title">HCP PRO</h1>
<button class="logoutBtn">Logout</button>
</div>

<div class="container">
<p class="desc">
Tap = −0.1 • Tieni premuto = +0.1 (accelerato)
</p>
<div class="grid" id="grid"></div>
</div>

<div class="container">
<div id="hcp" class="big">--</div>
</div>

<div class="container">

<div id="simBox">
<button onclick="changeSTB(-1)">−</button>
<div id="sim">36</div>
<button onclick="changeSTB(1)">+</button>
</div>

<button onclick="simula()">Simula gara</button>
<button onclick="conferma()">✅ Conferma risultato</button>
<button onclick="undo()">↩ Undo</button>

</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

<script>
let data = new Array(20).fill(null)
let stbValue = 36
let lastState = null

function vibrate(type){
if(!navigator.vibrate) return
if(type==="tap") navigator.vibrate(10)
if(type==="hold") navigator.vibrate(5)
}

/* ✅ INIT PRO */
function init(){
grid.innerHTML=""

for(let i=0;i<20;i++){

let el=document.createElement("div")
el.className="sdBtn"
el.innerText="--"

/* TAP = -0.1 */
el.onclick=()=>{
changeSD(i,-0.1)
vibrate("tap")
}

/* HOLD = +0.1 accelerato */
let interval=null
let speed=150

function startHold(){
speed=150
interval=setInterval(()=>{
changeSD(i,0.1)
vibrate("hold")

/* ✅ accelerazione */
if(speed>50){
speed-=10
clearInterval(interval)
interval=setInterval(()=>{
changeSD(i,0.1)
vibrate("hold")
},speed)
}

},speed)
}

function stopHold(){
clearInterval(interval)
}

/* mouse */
el.onmousedown=startHold
el.onmouseup=stopHold
el.onmouseleave=stopHold

/* mobile */
el.ontouchstart=startHold
el.ontouchend=stopHold

grid.appendChild(el)
}
}

init()

function changeSD(i,delta){
if(data[i]===null) data[i]=0

data[i]+=delta
data[i]=Math.round(data[i]*10)/10
data[i]=Math.max(0,Math.min(60,data[i]))

update()
}

/* HCP */
function calcHCP(list){
let s=list.slice().sort((a,b)=>a-b).slice(0,8)
return s.reduce((a,b)=>a+b,0)/8
}

/* top8 cronologico */
function getTop8(list){
let sorted=list.slice().sort((a,b)=>a-b).slice(0,8)
let res=[]
list.forEach(v=>{
if(sorted.includes(v)){
res.push(v)
sorted.splice(sorted.indexOf(v),1)
}
})
return res
}

function update(){

let clean=data.filter(v=>v!==null)

if(clean.length<8){
hcp.innerText="--"
}else{
hcp.innerText=calcHCP(clean).toFixed(2)
}

/* UI */
document.querySelectorAll(".sdBtn").forEach((el,i)=>{
el.innerText = data[i]?.toFixed(1) ?? "--"
el.classList.remove("top8")
})

let sorted=clean.slice().sort((a,b)=>a-b).slice(0,8)

sorted.forEach(val=>{
for(let i=0;i<data.length;i++){
if(data[i]===val){
document.getElementsByClassName("sdBtn")[i].classList.add("top8")
break
}
}
})

draw(getTop8(clean))
updateSimColor()
}

/* grafico */
function draw(d){
if(d.length===0) return
if(window.chart)window.chart.destroy()

window.chart=new Chart(grafico,{
type:'line',
data:{
labels:d.map((_,i)=>i+1),
datasets:[{
data:d,
borderColor:"green",
fill:false
}]
}
})
}

/* stb */
function changeSTB(d){
stbValue+=d
stbValue=Math.max(20,Math.min(45,stbValue))
sim.innerText=stbValue
updateSimColor()
}

/* simula */
function simula(){
let clean=data.filter(v=>v!==null)
if(clean.length<8)return

lastState=[...data]

let sd=(36-stbValue)+calcHCP(clean)

data.shift()
data.push(sd)

update()
}

/* undo */
function undo(){
if(!lastState) return
data=[...lastState]
update()
}

function conferma(){
lastState=null
}

/* colori */
function updateSimColor(){
let clean=data.filter(v=>v!==null)
if(clean.length<8) return

let old=calcHCP(clean)
let sd=(36-stbValue)+old

let newList=[...data]
newList.shift()
newList.push(sd)

let newH=calcHCP(newList.filter(v=>v!==null))

if(newH>old) sim.style.background="#e53935"
else if(Math.abs(newH-old)<0.01) sim.style.background="#ff9800"
else sim.style.background="#2e7d32"
}
</script>

</body>
</html>
