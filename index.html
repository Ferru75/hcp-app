
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#e8f5e9;margin:0}
.container{background:white;margin:10px;border-radius:14px;padding:14px}

/* layout principale */
.mainRow{
display:flex;
gap:10px;
}

/* GRID SD */
.grid{
flex:1;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
}

/* SD piccoli */
.grid input{
font-size:13px;
padding:4px;
height:32px;
text-align:center;
border-radius:6px;
border:1px solid #ccc;
}

/* selezione */
.selectedSD{
border:2px solid #ff9800;
background:#fff3cd;
}

/* CONTROLLO DESTRA */
#sdController{
display:flex;
flex-direction:column;
justify-content:center;
gap:10px;
}

#sdController button{
width:45px;
height:45px;
font-size:20px;
border-radius:8px;
background:#2e7d32;
color:white;
border:none;
}

/* STABLEFORD */
#simBox{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin:10px 0;
}

#simBox button{
width:45px;
height:45px;
font-size:22px;
border-radius:50%;
background:#2e7d32;
color:white;
border:none;
}

#sim{
font-size:24px;
font-weight:bold;
background:#ff9800;
color:white;
padding:8px;
border-radius:8px;
}

.big{font-size:40px;text-align:center;font-weight:bold}
.top8{background:#c8e6c9}

button{
margin-top:6px;
width:100%;
padding:10px;
background:green;
color:white;
border:none;
border-radius:10px
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="container">
<h2 style="text-align:center;">HCP PRO</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Crea account</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="container" style="position:relative">

<h1 style="text-align:center;">HCP PRO</h1>

<p style="text-align:center">
Clicca su ogni singolo box ed inserisci i tuoi ultimi 20 SD a partire dal più vecchio
</p>

<button onclick="logout()" style="
position:absolute;
top:10px;
right:10px;
padding:4px 8px;
font-size:11px;
width:auto;
background:#2e7d32;">
Logout
</button>

</div>

<div class="container">

<div class="mainRow">

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- CONTROLLER -->
<div id="sdController">
<button onclick="changeSelectedSD(-0.1)">−</button>
<button onclick="changeSelectedSD(0.1)">+</button>
</div>

</div>

</div>

<div class="container">
<div id="hcp" class="big">--</div>
</div>

<div class="container">

<div id="simBox">
<button onclick="changeSTB(-1)">−</button>
<div id="sim">36</div>
<button onclick="changeSTB(1)">+</button>
</div>

<button onclick="simula()">Simula gara</button>
<button onclick="conferma()">✅ Conferma risultato</button>
<button onclick="undo()">↩ Torna indietro</button>

<div id="out"></div>

</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

</div>

<script>

let userCorrente=null
let lastState=null
let lastSimulatedList=null
let stbValue=36
let selectedIndex=null

// LOGIN
function register(){
localStorage.setItem("u_"+user.value,btoa(pass.value))
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}

function login(){
if(localStorage.getItem("u_"+user.value)===btoa(pass.value)){
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}else alert("Credenziali errate")
}

function logout(){
localStorage.removeItem("lastUser")
location.reload()
}

function start(){
loginBox.style.display="none"
app.classList.remove("hidden")
init()
}

// INIT
function init(){
grid.innerHTML=""
for(let i=0;i<20;i++){

let el=document.createElement("input")
el.type="number"
el.step="0.1"
el.id="g"+i

el.onclick=()=>selectSD(i)
el.oninput=update

grid.appendChild(el)
}
load()
update()
}

// SELEZIONE
function selectSD(i){
selectedIndex=i

document.querySelectorAll("#grid input").forEach(el=>{
el.classList.remove("selectedSD")
})

document.getElementById("g"+i).classList.add("selectedSD")
}

// MODIFICA
function changeSelectedSD(delta){

if(selectedIndex===null)return

let el=document.getElementById("g"+selectedIndex)

let val=parseFloat(el.value)
if(isNaN(val)) val=0

val+=delta

if(val<0) val=0
if(val>60) val=60

el.value=val.toFixed(1)

update()
}

// STABLEFORD
function changeSTB(d){
stbValue+=d
if(stbValue<20)stbValue=20
if(stbValue>45)stbValue=45

sim.innerText=stbValue
}

// DATI
function getFull(){
let arr=[]
for(let i=0;i<20;i++){
let v=document.getElementById("g"+i).value
arr.push(v!==""?parseFloat(v):null)
}
return arr
}

// HCP
function calcHCP(list){
let sorted=list.slice().sort((a,b)=>a-b)
let top8=sorted.slice(0,8)
return top8.reduce((a,b)=>a+b,0)/8
}

// UPDATE
function update(){

let full=getFull()
let clean=full.filter(v=>v!==null)

if(clean.length<8){
hcp.innerText="--"
return
}

let h=calcHCP(clean)
hcp.innerText=h.toFixed(2)

document.querySelectorAll("input").forEach(i=>i.classList.remove("top8"))

let sorted=clean.slice().sort((a,b)=>a-b)
let top8=sorted.slice(0,8)

top8.forEach(val=>{
for(let i=0;i<20;i++){
let el=document.getElementById("g"+i)
if(parseFloat(el.value)===val&&!el.classList.contains("top8")){
el.classList.add("top8")
break
}
}
})

save()
draw(full)
}

// GRAFICO
function draw(list){

let clean=list.filter(v=>v!==null)
let sorted=clean.slice().sort((a,b)=>a-b)
let top8=sorted.slice(0,8)

let result=[]
list.forEach(v=>{
if(top8.includes(v)){
result.push(v)
top8.splice(top8.indexOf(v),1)
}
})

if(window.chart)window.chart.destroy()

window.chart=new Chart(grafico,{
type:'line',
data:{
labels:result.map((_,i)=>i+1),
datasets:[{
data:result,
borderColor:"green"
}]
}
})
}

// SIMULA
function simula(){

let full=getFull()
let base=full.filter(v=>v!==null)
if(base.length<8)return

let old=calcHCP(base)
let stb=stbValue

let sd=(36-stb)+old

let newList=full.slice()
newList.shift()
newList.push(sd)

lastSimulatedList=newList

let next=calcHCP(newList.filter(v=>v!==null))

hcp.innerText=next.toFixed(2)
draw(newList)
}

// STORAGE
function save(){
for(let i=0;i<20;i++){
localStorage.setItem(userCorrente+"_g"+i,
document.getElementById("g"+i).value)
}}

function load(){
for(let i=0;i<20;i++){
let v=localStorage.getItem(userCorrente+"_g"+i)
if(v)document.getElementById("g"+i).value=v
}}

</script>

</body>
</html>
