
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<!-- ✅ PWA CORRETTA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#eef7ee;
margin:0;
}

.hidden{display:none;}

.container{
background:white;
margin:3px;
border-radius:10px;
padding:6px;
}

/* ✅ TITOLO */
.title{
text-align:center;
font-size:30px;
font-weight:bold;
margin:6px 0;
}

/* layout */
.mainRow{
display:flex;
gap:4px;
align-items:center;
}

/* ✅ GRIGLIA CORRETTA */
.grid{
flex:1;
display:grid;
grid-template-columns:repeat(4, 1fr);
gap:2px;
}

/* ✅ SD PERFETTI */
.grid input{
font-size:11px;
height:34px;
padding:0;
margin:0;
text-align:center;

border-radius:6px;
border:1px solid #999;

width:100%;
box-sizing:border-box;
}

/* selezione */
.selectedSD{
border:2px solid orange;
background:#fff3cd;
}

/* top 8 */
.top8{
background:#c8e6c9;
}

/* ✅ CONTROLLER BLOCCATO (FIX VERO) */
#sdController{
width:34px;
flex-shrink:0;
display:flex;
flex-direction:column;
gap:4px;
}

#sdController button{
width:100%;
height:32px;
font-size:14px;
border-radius:6px;
background:#2e7d32;
color:white;
border:none;
}

/* hcp */
.big{
font-size:32px;
text-align:center;
font-weight:bold;
}

/* simulazione */
#simBox{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin:6px 0;
}

#simBox button{
width:34px;
height:34px;
border-radius:50%;
background:#2e7d32;
color:white;
border:none;
}

#sim{
font-size:18px;
font-weight:bold;
background:#ff9800;
color:white;
padding:5px 10px;
border-radius:6px;
}

/* bottoni */
button{
width:100%;
padding:7px;
margin-top:6px;
border:none;
border-radius:8px;
background:#2e7d32;
color:white;
}

p{
font-size:11px;
text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="container">
<h2 class="title">HCP PRO</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Crea account</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="container" style="position:relative">
<h1 class="title">HCP PRO</h1>

<button onclick="logout()" style="
position:absolute;
top:6px;
right:6px;
padding:6px 12px;
font-size:13px;
border-radius:8px;">
Logout
</button>
</div>

<div class="container">

<p>
Inserisci i tuoi ultimi risultati SD (li trovi sui siti della Federgolf o Gesgolf) dal più vecchio al più recente
</p>

<div class="mainRow">

<div class="grid" id="grid"></div>

<div id="sdController">
<button onclick="changeSelectedSD(-0.1)">−</button>
<button onclick="changeSelectedSD(0.1)">+</button>
</div>

</div>
</div>

<div class="container">
<div id="hcp" class="big">--</div>
</div>

<div class="container">

<div id="simBox">
<button onclick="changeSTB(-1)">−</button>
<div id="sim">36</div>
<button onclick="changeSTB(1)">+</button>
</div>

<button onclick="simula()">Simula gara</button>
<button onclick="conferma()">✅ Conferma risultato</button>
<button onclick="undo()">↩ Torna indietro</button>

</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

</div>

<script>
let userCorrente=null
let lastState=null
let lastSimulatedList=null
let stbValue=36
let selectedIndex=null

/* ✅ SERVICE WORKER */
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js')
}

/* LOGIN */
function register(){
localStorage.setItem("u_"+user.value,btoa(pass.value))
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}

function login(){
if(localStorage.getItem("u_"+user.value)===btoa(pass.value)){
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}else alert("Credenziali errate")
}

function logout(){
localStorage.removeItem("lastUser")
location.reload()
}

function start(){
loginBox.style.display="none"
app.classList.remove("hidden")
init()
}

function init(){
grid.innerHTML=""
for(let i=0;i<20;i++){
let el=document.createElement("input")
el.type="number"
el.step="0.1"
el.id="g"+i

el.onclick=()=>selectSD(i)
el.oninput=update

grid.appendChild(el)
}
load()
update()
}

/* selezione */
function selectSD(i){
selectedIndex=i
document.querySelectorAll("#grid input").forEach(el=>el.classList.remove("selectedSD"))

let el=document.getElementById("g"+i)
el.classList.add("selectedSD")
el.focus()
}

/* modifica */
function changeSelectedSD(delta){
if(selectedIndex===null) return

let el=document.getElementById("g"+selectedIndex)
let val=parseFloat(el.value)
if(isNaN(val)) val=0

val+=delta
val=Math.max(0,Math.min(60,val))

el.value=val.toFixed(1)
update()
}

/* stb */
function changeSTB(d){
stbValue+=d
if(stbValue<20)stbValue=20
if(stbValue>45)stbValue=45

sim.innerText=stbValue
updateSimColor()
}

/* dati */
function getFull(){
let arr=[]
for(let i=0;i<20;i++){
let v=document.getElementById("g"+i).value
arr.push(v!==""?parseFloat(v):null)
}
return arr
}

/* hcp */
function calcHCP(list){
let sorted=list.slice().sort((a,b)=>a-b)
let top8=sorted.slice(0,8)
return top8.reduce((a,b)=>a+b,0)/8
}

/* update */
function update(){
let full=getFull()
let clean=full.filter(v=>v!==null)

if(clean.length<8){
hcp.innerText="--"
return
}

let h=calcHCP(clean)
hcp.innerText=h.toFixed(2)

document.querySelectorAll("input").forEach(i=>i.classList.remove("top8"))

let sorted=clean.slice().sort((a,b)=>a-b)
let top8=sorted.slice(0,8)

top8.forEach(val=>{
for(let i=0;i<20;i++){
let el=document.getElementById("g"+i)
if(parseFloat(el.value)===val && !el.classList.contains("top8")){
el.classList.add("top8")
break
}
}
})

save()
draw(full)
updateSimColor()
}

/* colori */
function updateSimColor(){
let full=getFull()
let base=full.filter(v=>v!==null)
if(base.length<8) return

let oldHCP=calcHCP(base)
let sd=(36-stbValue)+oldHCP

let newList=full.slice()
newList.shift()
newList.push(sd)

let newHCP=calcHCP(newList.filter(v=>v!==null))

if(newHCP > oldHCP){
sim.style.background="#e53935"
}else if(Math.abs(newHCP-oldHCP)<0.01){
sim.style.background="#ff9800"
}else{
sim.style.background="#2e7d32"
}
}

/* grafico */
function draw(list){
let clean=list.filter(v=>v!==null)
if(clean.length===0) return

if(window.chart)window.chart.destroy()

window.chart=new Chart(document.getElementById("grafico"),{
type:'line',
data:{
labels:clean.map((_,i)=>i+1),
datasets:[{
data:clean,
borderColor:"green",
fill:false
}]
},
options:{plugins:{legend:{display:false}}}
})
}

/* simula */
function simula(){
let full=getFull()
let base=full.filter(v=>v!==null)
if(base.length<8)return

let old=calcHCP(base)
let sd=(36-stbValue)+old

let newList=full.slice()
newList.shift()
newList.push(sd)

lastSimulatedList=newList

let next=calcHCP(newList.filter(v=>v!==null))
hcp.innerText=next.toFixed(2)

draw(newList)
}

/* conferma */
function conferma(){
if(!lastSimulatedList) return
lastState=getFull()

for(let i=0;i<20;i++){
document.getElementById("g"+i).value = lastSimulatedList[i] ?? ""
}

lastSimulatedList=null
update()
}

/* undo */
function undo(){
if(!lastState) return

for(let i=0;i<20;i++){
document.getElementById("g"+i).value = lastState[i] ?? ""
}

update()
}

/* storage */
function save(){
for(let i=0;i<20;i++){
localStorage.setItem(userCorrente+"_g"+i,document.getElementById("g"+i).value)
}
}

function load(){
for(let i=0;i<20;i++){
let v=localStorage.getItem(userCorrente+"_g"+i)
if(v) document.getElementById("g"+i).value=v
}
}
</script>

</body>
</html>
