
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#e8f5e9;margin:0}
.container{background:white;margin:10px;border-radius:14px;padding:14px}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
}

input,select{
width:100%;
padding:6px;
border-radius:8px;
text-align:center;
border:1px solid #ccc
}

button{
margin-top:4px;
padding:6px;
background:green;
color:white;
border:none;
border-radius:8px;
}

/* SD buttons */
.grid button{
flex:1;
font-size:12px;
}

.sdBox{
display:flex;
gap:2px;
}

/* Stableford PRO */
#simBox{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
margin:10px 0;
}

#simBox button{
width:60px;
height:60px;
font-size:28px;
border-radius:50%;
background:#2e7d32;
color:white;
border:none;
}

#sim{
font-size:36px;
font-weight:bold;
min-width:90px;
text-align:center;
background:#ff9800;
color:white;
padding:12px;
border-radius:12px;
}

#sim.low{ background:#b71c1c; }
#sim.mid{ background:#ff9800; }
#sim.high{ background:#2e7d32; }

/* graph */
.big{font-size:46px;text-align:center;font-weight:bold}
.top8{background:#c8e6c9}
.warning{background:#ffcdd2}

/* splash */
#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#2e7d32;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
z-index:9999;
}
</style>
</head>

<body>

<div id="splash">HCP PRO ⛳</div>

<div id="loginBox" class="container">
<h2 style="text-align:center;">HCP PRO</h2>
<p style="text-align:center;">Accedi o crea account</p>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Crea account</button>
</div>

<div id="app" class="hidden">

<div class="container">
<h1 style="text-align:center;">HCP PRO</h1>
<p style="text-align:center">Inserisci i tuoi ultimi 20 SD dal più vecchio</p>
<button onclick="logout()">Logout</button>
</div>

<div class="container">
<div class="grid" id="grid"></div>
</div>

<div class="container">
<div id="hcp" class="big">--</div>
</div>

<div class="container">

<select id="campo"></select>

<select id="tee">
<option value="giallo">Giallo</option>
<option value="bianco">Bianco</option>
<option value="verde">Verde</option>
<option value="rosso">Rosso</option>
</select>

<input id="crManuale" type="number" step="0.1" placeholder="CR override">
<input id="slopeManuale" type="number" placeholder="Slope override">

<div id="infoCampo"></div>

<!-- ✅ STABLEFORD PRO -->
<div id="simBox">
  <button onclick="changeSTB(-1)">−</button>
  <div id="sim">36</div>
  <button onclick="changeSTB(1)">+</button>
</div>

<button onclick="simula()">Simula gara</button>
<button onclick="conferma()">✅ Conferma risultato</button>
<button onclick="undo()">↩ Torna indietro</button>

<div id="out"></div>
<div id="target"></div>

</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

</div>

<script>

let userCorrente=null
let campi=[]
let lastState=null
let lastSimulatedList=null

let stbValue = 36

// SPLASH
setTimeout(()=>{
document.getElementById("splash").style.display="none"
},1000)

// AUTOLOGIN
window.addEventListener("DOMContentLoaded",()=>{
let saved=localStorage.getItem("lastUser")
if(saved){userCorrente=saved;start()}
})

// LOGIN
function register(){
if(!user.value || !pass.value) return alert("Inserisci dati")
localStorage.setItem("u_"+user.value,btoa(pass.value))
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}

function login(){
if(localStorage.getItem("u_"+user.value)===btoa(pass.value)){
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}else{
alert("Credenziali errate")
}
}

function logout(){
localStorage.removeItem("lastUser")
location.reload()
}

function start(){
loginBox.classList.add("hidden")
app.classList.remove("hidden")
init()
}

// INIT
async function init(){
grid.innerHTML=""
for(let i=0;i<20;i++){

let box=document.createElement("div")
box.className="sdBox"

box.innerHTML=`
<button onclick="changeSD(${i},-0.1)">−</button>
<input id="g${i}" type="number" step="0.1" oninput="update()">
<button onclick="changeSD(${i},0.1)">+</button>
`

grid.appendChild(box)
}

await loadCampi()
load()
update()
}

// CAMPI
async function loadCampi(){
let res=await fetch("campi.json")
campi=await res.json()

campo.innerHTML='<option value="">Campo</option>'
campi.forEach(c=>{
let o=document.createElement("option")
o.value=c.nome
o.textContent=c.nome
campo.appendChild(o)
})
}

// INFO CAMPO
campo.onchange=updateInfo
tee.onchange=updateInfo

function updateInfo(){
let c=campi.find(x=>x.nome===campo.value)
if(!c)return
let d=c.tee[tee.value]||c.tee.giallo
infoCampo.innerHTML="CR "+d.cr+" | Slope "+d.slope
}

// SD CHANGE
function changeSD(i,delta){
let el=document.getElementById("g"+i)
let v=parseFloat(el.value)
if(isNaN(v))v=0
v+=delta
if(v<0)v=0
if(v>60)v=60
el.value=v.toFixed(1)
update()
}

// STB CONTROL
function changeSTB(delta){
stbValue+=delta
if(stbValue<20)stbValue=20
if(stbValue>45)stbValue=45

sim.innerText=stbValue

sim.classList.remove("low","mid","high")
if(stbValue<34)sim.classList.add("low")
else if(stbValue<=37)sim.classList.add("mid")
else sim.classList.add("high")
}

// DATI
function getFull(){
let arr=[]
for(let i=0;i<20;i++){
let v=document.getElementById("g"+i).value
arr.push(v!=="" ? parseFloat(v) : null)
}
return arr
}

// HCP
function calcHCP(list){
let sorted=list.slice().sort((a,b)=>a-b)
let top8=sorted.slice(0,8)
return top8.reduce((a,b)=>a+b,0)/8
}

// UPDATE
function update(){

let full=getFull()
let clean=full.filter(v=>v!==null)

if(clean.length<8){
hcp.innerText="--"
return
}

let h=calcHCP(clean)
hcp.innerText=h.toFixed(2)

document.querySelectorAll("input").forEach(i=>i.classList.remove("top8"))

let sorted=clean.slice().sort((a,b)=>a-b)
let top8=sorted.slice(0,8)

top8.forEach(val=>{
for(let i=0;i<20;i++){
let el=document.getElementById("g"+i)
if(parseFloat(el.value)===val && !el.classList.contains("top8")){
el.classList.add("top8")
break
}
}
})

save()
draw(full)
}

// GRAFICO
function draw(list){

let clean=list.filter(v=>v!==null)
let sorted=clean.slice().sort((a,b)=>a-b)
let top8=sorted.slice(0,8)

let result=[]
list.forEach(v=>{
if(top8.includes(v)){
result.push(v)
top8.splice(top8.indexOf(v),1)
}
})

if(window.chart)window.chart.destroy()

window.chart=new Chart(grafico,{
type:'line',
data:{
labels:result.map((_,i)=>i+1),
datasets:[{
data:result,
borderColor:"green",
backgroundColor:"rgba(0,128,0,0.2)",
tension:0.3
}]
},
options:{
plugins:{legend:{display:false}},
scales:{y:{reverse:true}}
}
})
}

// SIMULA
function simula(){

let full=getFull()
let base=full.filter(v=>v!==null)
if(base.length<8)return

lastState=full.slice()

let campoSel=campi.find(c=>c.nome===campo.value)
if(!campoSel)return

let cr=parseFloat(crManuale.value)
let slope=parseFloat(slopeManuale.value)

let dati=(!isNaN(cr)&&!isNaN(slope))
?{cr,slope}
:(campoSel.tee[tee.value]||campoSel.tee.giallo)

let stb=stbValue

let old=calcHCP(base)

let score=dati.cr+(36-stb)+old
let sd=(113/dati.slope)*(score-dati.cr)

let newList=full.slice()
newList.shift()
newList.push(sd)

lastSimulatedList=newList

let next=calcHCP(newList.filter(v=>v!==null))

hcp.innerText=next.toFixed(2)
draw(newList)
}

function conferma(){
if(!lastSimulatedList)return
for(let i=0;i<20;i++){
document.getElementById("g"+i).value=
lastSimulatedList[i]?lastSimulatedList[i].toFixed(2):""
}
save()
update()
}

function undo(){
if(!lastState)return
for(let i=0;i<20;i++){
document.getElementById("g"+i).value=
lastState[i]?lastState[i]:""
}
save()
update()
}

function save(){
for(let i=0;i<20;i++){
localStorage.setItem(userCorrente+"_g"+i,
document.getElementById("g"+i).value)
}}

function load(){
for(let i=0;i<20;i++){
let v=localStorage.getItem(userCorrente+"_g"+i)
if(v)document.getElementById("g"+i).value=v
}}

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js")
}

</script>

</body>
</html>
``
