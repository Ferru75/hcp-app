
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HCP Golf Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: -apple-system, Arial;
    background:#e8f5e9;
    margin:0;
    padding:12px;
}

h2 {
    text-align:center;
    color:#1B5E20;
}

.container {
    background:white;
    padding:15px;
    margin-bottom:12px;
    border-radius:16px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.grid {
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:6px;
}

input {
    width:100%;
    padding:12px;
    text-align:center;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
}

input:focus {
    border-color:#1B5E20;
    outline:none;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background: linear-gradient(45deg,#1B5E20,#43A047);
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
}

.big {
    font-size:48px;
    font-weight:bold;
    text-align:center;
    color:#1B5E20;
}

.stat {
    text-align:center;
    font-size:18px;
    margin-top:5px;
}

.green {color:#2E7D32;}
.red {color:#C62828;}

.highlight {
    border:2px solid gold !important;
}

canvas {
    margin-top:10px;
}
</style>
</head>

<body>

<h2>⛳ HCP Golf Pro</h2>

<div class="container">
    <label>HCP Attuale</label>
    <input id="hcpBase" type="number" step="0.1">
</div>

<div class="container">
    <div class="grid" id="grid"></div>
</div>

<div class="container">
    <div class="big" id="hcp">0</div>
    <div class="stat" id="stato"></div>
</div>

<div class="container">
    <input id="simStb" type="number" placeholder="Simula STB">
    <button id="btnSimula">Simula gara</button>
    <div class="stat" id="simRes"></div>
</div>

<div class="container">
    <canvas id="grafico"></canvas>
</div>

<script>

// ===== CREAZIONE 20 CASELLE =====
const grid = document.getElementById("grid")
for(let i=0;i<20;i++){
    let input = document.createElement("input")
    input.type="number"
    input.placeholder = i+1
    input.id="g"+i
    grid.appendChild(input)
}

// ===== DATI =====
let data = JSON.parse(localStorage.getItem("stb")) || []
let hcpBase = parseFloat(localStorage.getItem("hcpBase")) || 0

document.getElementById("hcpBase").value = hcpBase

// ===== SALVA =====
function save(){
    localStorage.setItem("stb", JSON.stringify(data))
    localStorage.setItem("hcpBase", hcpBase)
}

// ===== PRENDI DATI =====
function getData(){
    let arr = []
    for(let i=0;i<20;i++){
        let v=document.getElementById("g"+i).value
        if(v) arr.push(36 - parseFloat(v))
    }
    return arr
}

// ===== CALCOLO =====
function calcHCP(list){
    if(list.length<8) return hcpBase
    let sorted=[...list].sort((a,b)=>a-b)
    let top8=sorted.slice(0,8)
    return top8.reduce((a,b)=>a+b,0)/8
}

// ===== UPDATE =====
function aggiorna(){

    hcpBase = parseFloat(document.getElementById("hcpBase").value) || 0
    let list = getData()

    let hcp = calcHCP(list)

    document.getElementById("hcp").innerText = hcp.toFixed(2)

    let diff = hcp - hcpBase
    let stato = diff < 0 ? "🟢 SCENDI" : "🔴 SALI"

    document.getElementById("stato").innerHTML = stato

    // highlight top 8
    let sorted=[...list].sort((a,b)=>a-b)
    let top8=sorted.slice(0,8)

    for(let i=0;i<20;i++){
        let val=document.getElementById("g"+i).value
        let el=document.getElementById("g"+i)

        if(val && top8.includes(36-val)){
            el.classList.add("highlight")
        } else {
            el.classList.remove("highlight")
        }
    }

    // grafico
    let andamento=[]
    for(let i=1;i<=list.length;i++){
        andamento.push(calcHCP(list.slice(0,i)))
    }

    if(window.chart) window.chart.destroy()

    window.chart = new Chart(document.getElementById("grafico"),{
        type:'line',
        data:{
            labels: andamento.map((_,i)=>i+1),
            datasets:[{
                data: andamento,
                borderColor:'green',
                tension:0.3
            }]
        },
        options:{
            plugins:{legend:{display:false}}
        }
    })

    save()
}

// ===== SIMULAZIONE =====
document.getElementById("btnSimula").addEventListener("click", function(){

    let list=getData()
    let stb=parseInt(document.getElementById("simStb").value)

    if(!stb) return

    let copy=[...list]
    if(copy.length>=20) copy.shift()
    copy.push(36-stb)

    let nuovo=calcHCP(copy)
    let diff=nuovo-hcpBase

    let stato = diff<0 ? "🟢 SCENDI" : "🔴 SALI"

    document.getElementById("simRes").innerHTML =
        nuovo.toFixed(2)+" · "+stato
})

// aggiorna live
document.addEventListener("input", aggiorna)

aggiorna()

</script>

</body>
</html>
