
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#e8f5e9;padding:10px}
.container{background:white;padding:12px;margin-bottom:10px;border-radius:12px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
input,select{width:100%;padding:8px;text-align:center}
button{width:100%;padding:10px;background:green;color:white;border:none}
.big{font-size:36px;text-align:center;font-weight:bold}
.hidden{display:none}
</style>
</head>

<body>

<div id="loginBox" class="container">
<h3>Login</h3>
<input id="user" placeholder="utente">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="register()">Crea utente</button>
</div>

<div id="app" class="hidden">

<div class="container">
<div class="grid" id="grid"></div>
</div>

<div class="container">
<div id="hcp" class="big">--</div>
</div>

<div class="container">
<select id="campo"></select>
<input id="sim" type="number" placeholder="Stableford">
<button onclick="simula()">Simula gara</button>
<div id="out"></div>
</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

</div>

<script>

let userCorrente=null
let campi=[]

// ✅ INIT
document.addEventListener("DOMContentLoaded",()=>{
let saved=localStorage.getItem("lastUser")
if(saved){userCorrente=saved;start()}
})

// ✅ LOGIN
function register(){
localStorage.setItem("u_"+user.value,btoa(pass.value))
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}

function login(){
if(localStorage.getItem("u_"+user.value)===btoa(pass.value)){
userCorrente=user.value
localStorage.setItem("lastUser",user.value)
start()
}}
    
// ✅ START
function start(){
loginBox.classList.add("hidden")
app.classList.remove("hidden")
initApp()
}

// ✅ INIT APP
async function initApp(){

grid.innerHTML=""

for(let i=0;i<20;i++){
let el=document.createElement("input")
el.type="number"
el.id="g"+i
el.step="0.1"
el.oninput=update
grid.appendChild(el)
}

await loadCampi()

load()
update()
}

// ✅ LOAD CAMPI
async function loadCampi(){
let res=await fetch("campi.json")
campi=await res.json()

campo.innerHTML='<option value="">Campo</option>'

campi.sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(c=>{
let o=document.createElement("option")
o.value=c.nome
o.textContent=c.nome
campo.appendChild(o)
})
}

// ✅ DATA
function getData(){
let a=[]
for(let i=0;i<20;i++){
let v=document.getElementById("g"+i).value
if(v)a.push(parseFloat(v))
}
return a
}

// ✅ HCP
function calc(l){
if(l.length<8)return null
let s=l.slice().sort((a,b)=>a-b).slice(0,8)
return s.reduce((a,b)=>a+b,0)/8
}

// ✅ UPDATE
function update(){
let list=getData()
if(list.length<8){hcp.innerText="--";return}

let val=calc(list)
hcp.innerText=val.toFixed(2)

save()
draw(list)
}

// ✅ GRAFICO
function draw(list){
let arr=[]
for(let i=8;i<=list.length;i++){
arr.push(calc(list.slice(0,i)))
}

if(window.chart)chart.destroy()

window.chart=new Chart(grafico,{
type:'line',
data:{labels:arr.map((_,i)=>i+8),
datasets:[{data:arr,borderColor:'green'}]}
})
}

// ✅ SIMULAZIONE
function simula(){

let base=getData()
if(base.length<8)return

let campoSel=campi.find(c=>c.nome===campo.value)
if(!campoSel)return

let stb=parseFloat(sim.value)
if(isNaN(stb))return

let d=campoSel.tee.giallo

let sd=(d.cr-72)+((113/d.slope)*(36-stb))

let list=base.slice()
if(list.length>=20)list.shift()
list.push(sd)

let newHcp=calc(list)

hcp.innerText=newHcp.toFixed(2)
out.innerHTML="SD: "+sd.toFixed(2)

draw(list)
}

// ✅ STORAGE
function save(){
for(let i=0;i<20;i++){
localStorage.setItem(userCorrente+"_g"+i,
document.getElementById("g"+i).value)
}}

function load(){
for(let i=0;i<20;i++){
let v=localStorage.getItem(userCorrente+"_g"+i)
if(v)document.getElementById("g"+i).value=v
}}

</script>

</body>
</html>
