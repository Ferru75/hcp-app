
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HCP Golf Pro</title>

<!-- CHART JS CORRETTO -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    padding: 15px;
    background: #f5f5f5;
}

h2 {
    color: #1B5E20;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #1B5E20;
    color: white;
    border: none;
    font-size: 16px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

.big {
    font-size: 30px;
    font-weight: bold;
}
</style>

</head>

<body>

<h2>⛳ HCP Golf Pro</h2>

<div>
    HCP: <span id="hcp" class="big">0</span>
</div>

<input id="stb" type="number" placeholder="Inserisci STB">
<button onclick="aggiungi()">Aggiungi gara</button>

<textarea id="importText" placeholder="Incolla risultati FIG"></textarea>
<button onclick="importa()">Importa risultati</button>

<input id="simulaStb" type="number" placeholder="Simula STB">
<button onclick="simula()">Simula</button>

<div id="simulaOutput"></div>

<canvas id="grafico" style="margin-top:20px;"></canvas>

<script>

/* ======================
   DATI
====================== */
let data = JSON.parse(localStorage.getItem("hcp")) || []

function salva() {
    localStorage.setItem("hcp", JSON.stringify(data))
}

/* ======================
   CALCOLO HCP
====================== */
function calcolaHcp(lista) {
    if (lista.length < 8) return 0

    let sorted = [...lista].sort((a,b)=>a-b)
    let top8 = sorted.slice(0,8)

    return top8.reduce((a,b)=>a+b,0) / 8
}

/* ======================
   AGGIORNA UI
====================== */
function aggiorna() {

    document.getElementById("hcp").innerText =
        calcolaHcp(data).toFixed(2)

    let andamento = data.map((_,i)=> 
        calcolaHcp(data.slice(0,i+1))
    )

    if (window.chart) window.chart.destroy()

    window.chart = new Chart(
        document.getElementById("grafico"),
        {
            type: 'line',
            data: {
                labels: andamento.map((_,i)=> i+1),
                datasets: [{
                    data: andamento,
                    borderColor: 'green',
                    fill: false,
                    tension: 0.2
                }]
            },
            options: {
                plugins: {
                    legend: { display: false }
                }
            }
        }
    )
}

/* ======================
   AGGIUNGI GARA
====================== */
function aggiungi() {

    let stb = parseInt(document.getElementById("stb").value)
    if (!stb) return

    if (data.length >= 20) data.shift()

    data.push(36 - stb)

    salva()
    aggiorna()
}

/* ======================
   IMPORTA
====================== */
function importa() {

    let text = document.getElementById("importText").value

    let numeri = text.match(/\d{2}/g)
    if (!numeri) return

    numeri.forEach(n => {
        if (data.length >= 20) data.shift()
        data.push(36 - parseInt(n))
    })

    salva()
    aggiorna()
}

/* ======================
   SIMULAZIONE
====================== */
function simula() {

    let stb = parseInt(document.getElementById("simulaStb").value)
    if (!stb) return

    let copia = [...data]

    if (copia.length >= 20) copia.shift()
    copia.push(36 - stb)

    document.getElementById("simulaOutput").innerText =
        "Nuovo HCP: " + calcolaHcp(copia).toFixed(2)
}

/* ====================== */
aggiorna()

</script>

</body>
</html>
