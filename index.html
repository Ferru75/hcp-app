
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#e8f5e9;margin:0}

.container{
background:white;
margin:6px;
border-radius:12px;
padding:10px;
}

.title{
text-align:center;
font-size:32px;
font-weight:bold;
}

/* ✅ GRID BOTTONI */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:4px;
}

.sdBtn{
height:42px;
border-radius:8px;
border:1px solid #999;
display:flex;
align-items:center;
justify-content:center;
background:#f3f3f3;
font-size:13px;
}

/* ✅ top 8 */
.top8{background:#c8e6c9}

/* ✅ logout FIX */
.logoutBtn{
position:absolute;
top:6px;
right:6px;
width:auto !important;
padding:6px 10px;
}

/* HCP */
.big{
font-size:52px;
text-align:center;
height:80px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* bottoni */
button{
width:100%;
padding:12px;
margin-top:6px;
border:none;
border-radius:10px;
background:#2e7d32;
color:white;
font-size:16px;
}
</style>
</head>

<body>

<div id="loginBox" class="container">
<h2 class="title">HCP PRO</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Crea account</button>
</div>

<div id="app" class="hidden">

<div class="container" style="position:relative">
<h1 class="title">HCP PRO</h1>
<button class="logoutBtn" onclick="logout()">Logout</button>
</div>

<div class="container">

<p style="text-align:center;font-size:13px">
Tap = −0.1 • Tieni premuto = + veloce
</p>

<div class="grid" id="grid"></div>

</div>

<div class="container">
<div id="hcp" class="big">--</div>
</div>

<div class="container">

<input id="sim" type="number" placeholder="Stableford">

<button onclick="simula()">Simula gara</button>
<button onclick="conferma()">✅ Conferma risultato</button>
<button onclick="undo()">↩ Undo</button>

<div id="out"></div>
<div id="target"></div>

</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

</div>

<script>

let userCorrente=null
let lastState=null
let lastSimulatedList=null
let data=new Array(20).fill(null)

/* LOGIN */
function register(){
localStorage.setItem("u_"+user.value,btoa(pass.value))
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}

function login(){
if(localStorage.getItem("u_"+user.value)===btoa(pass.value)){
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}else alert("Errore")
}

function logout(){
localStorage.removeItem("lastUser")
location.reload()
}

function start(){
loginBox.style.display="none"
app.classList.remove("hidden")
init()
load()
update()
}

/* ✅ GRID BOTTONI */
function init(){
grid.innerHTML=""

for(let i=0;i<20;i++){

let el=document.createElement("div")
el.className="sdBtn"

/* TAP */
el.onclick=()=>changeSD(i,-0.1)

/* HOLD veloce */
let interval=null

function startHold(){
stopHold()
let speed=100

interval=setInterval(()=>{
changeSD(i,0.1)

if(speed>30){
speed-=15
clearInterval(interval)
interval=setInterval(()=>changeSD(i,0.1),speed)
}

},speed)
}

function stopHold(){
if(interval){
clearInterval(interval)
interval=null
}
}

el.onmousedown=startHold
el.onmouseup=stopHold
el.onmouseleave=stopHold

el.ontouchstart=startHold
el.ontouchend=stopHold
el.ontouchcancel=stopHold

grid.appendChild(el)
}
}

function changeSD(i,d){
if(data[i]===null)data[i]=0
data[i]+=d
data[i]=Math.round(data[i]*10)/10
update()
}

/* HCP */
function calcHCP(list){
let s=list.slice().sort((a,b)=>a-b).slice(0,8)
return s.reduce((a,b)=>a+b,0)/8
}

function getData(){
return data.filter(v=>v!==null)
}

/* UPDATE */
function update(){

let clean=getData()

if(clean.length<8){
hcp.innerText="--"
}else{
hcp.innerText=calcHCP(clean).toFixed(2)
}

/* aggiorna UI */
document.querySelectorAll(".sdBtn").forEach((el,i)=>{
el.innerText=data[i]!=null?data[i].toFixed(1):"--"
el.classList.remove("top8")
})

/* ✅ TOP 8 PERFETTI */
let pairs=data
.map((v,i)=>({v,i}))
.filter(x=>x.v!==null)
.sort((a,b)=>a.v-b.v)
.slice(0,8)

pairs.forEach(p=>{
grid.children[p.i].classList.add("top8")
})

draw(clean)
save()
}

/* SIMULA (TUA LOGICA) */
function simula(){

let full=data.slice()
let base=full.filter(v=>v!==null)
if(base.length<8)return

lastState=full.slice()

let stb=parseFloat(sim.value)
if(isNaN(stb))return

let old=calcHCP(base)

let sd=(36-stb)+old

let newList=[...full.slice(1),sd]

lastSimulatedList=newList

let next=calcHCP(newList.filter(v=>v!==null))

hcp.innerText=next.toFixed(2)

draw(newList)
}

/* CONFERMA */
function conferma(){
if(!lastSimulatedList)return
data=[...lastSimulatedList]
lastSimulatedList=null
update()
}

/* UNDO */
function undo(){
if(!lastState)return
data=[...lastState]
update()
}

/* GRAFICO ORIGINALE */
function draw(list){

let values=[]
for(let i=8;i<=list.length;i++){
values.push(calcHCP(list.slice(0,i)))
}

if(window.chart)window.chart.destroy()

window.chart=new Chart(grafico,{
type:'line',
data:{
labels:values.map((_,i)=>i+8),
datasets:[{
data:values,
borderColor:"green"
}]
}
})
}

/* STORAGE */
function save(){
localStorage.setItem(userCorrente,JSON.stringify(data))
}
function load(){
let s=localStorage.getItem(userCorrente)
if(s)data=JSON.parse(s)
}

</script>

</body>
</html>
