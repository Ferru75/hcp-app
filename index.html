
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#e8f5e9;margin:0}
.container{background:white;margin:10px;border-radius:14px;padding:14px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
input,select{width:100%;padding:10px;border-radius:8px;text-align:center;border:1px solid #ccc}
button{margin-top:6px;width:100%;padding:12px;background:green;color:white;border:none;border-radius:10px}
.big{font-size:46px;text-align:center;font-weight:bold}
.hidden{display:none}
.top8{background:#c8e6c9}
.warning{background:#ffcdd2}
#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#2e7d32;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
z-index:9999;
}
</style>
</head>

<body>

<div id="splash">HCP PRO ⛳</div>

<div id="loginBox" class="container">
<h2 style="text-align:center;">HCP PRO</h2>
<p style="text-align:center;">Accedi o crea account</p>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Crea account</button>
</div>

<div id="app" class="hidden">

<div class="container">
<h1 style="text-align:center;">HCP PRO</h1>
<p style="text-align:center">Inserisci i tuoi ultimi 20 SD dal più vecchio</p>
<button onclick="logout()">Logout</button>
</div>

<div class="container">
<div class="grid" id="grid"></div>
</div>

<div class="container">
<div id="hcp" class="big">--</div>
</div>

<div class="container">

<select id="campo"></select>

<select id="tee">
<option value="giallo">Giallo</option>
<option value="bianco">Bianco</option>
<option value="verde">Verde</option>
<option value="rosso">Rosso</option>
<option value="blu">Blu</option>
<option value="arancio">Arancio</option>
</select>

<input id="crManuale" type="number" step="0.1" placeholder="CR override">
<input id="slopeManuale" type="number" placeholder="Slope override">

<div id="infoCampo"></div>

<input id="sim" type="number" placeholder="Stableford">

<button onclick="simula()">Simula gara</button>
<button onclick="conferma()">✅ Conferma risultato</button>
<button onclick="undo()">↩ Torna indietro</button>

<div id="out"></div>
<div id="target"></div>

</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

</div>

<script>

let userCorrente=null
let campi=[]
let lastState=null
let lastSimulatedList=null

setTimeout(()=>{
document.getElementById("splash").style.display="none"
},1000)

window.addEventListener("DOMContentLoaded",()=>{
let saved=localStorage.getItem("lastUser")
if(saved){userCorrente=saved;start()}
})

function register(){
if(!user.value || !pass.value) return alert("Inserisci dati")
localStorage.setItem("u_"+user.value,btoa(pass.value))
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}

function login(){
if(localStorage.getItem("u_"+user.value)===btoa(pass.value)){
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}else{
alert("Credenziali errate")
}
}

function logout(){
localStorage.removeItem("lastUser")
location.reload()
}

function start(){
loginBox.classList.add("hidden")
app.classList.remove("hidden")
init()
}

async function init(){
grid.innerHTML=""
for(let i=0;i<20;i++){
let el=document.createElement("input")
el.type="number"
el.step="0.1"
el.id="g"+i
el.oninput=update
grid.appendChild(el)
}
await loadCampi()
load()
update()
}

async function loadCampi(){
let res=await fetch("campi.json")
campi=await res.json()

campo.innerHTML='<option value="">Campo</option>'

campi.forEach(c=>{
let o=document.createElement("option")
o.value=c.nome
o.textContent=c.nome
campo.appendChild(o)
})
}

campo.onchange=updateInfo
tee.onchange=updateInfo

function updateInfo(){
let c=campi.find(x=>x.nome===campo.value)
if(!c)return
let d=c.tee[tee.value]||c.tee.giallo
infoCampo.innerHTML="CR "+d.cr+" | Slope "+d.slope
}

function getFull(){
let arr=[]
for(let i=0;i<20;i++){
let v=document.getElementById("g"+i).value
arr.push(v!=="" ? parseFloat(v) : null)
}
return arr
}

function calcHCP(list){
let sorted=list.slice().sort((a,b)=>a-b)
let top8=sorted.slice(0,8)
return top8.reduce((a,b)=>a+b,0)/8
}

function update(){

let full=getFull()
let clean=full.filter(v=>v!==null)

if(clean.length<8){
hcp.innerText="--"
return
}

let h=calcHCP(clean)
hcp.innerText=h.toFixed(2)

for(let i=0;i<20;i++){
document.getElementById("g"+i).classList.remove("top8","warning")
}

let sorted=clean.slice().sort((a,b)=>a-b)
let top8=sorted.slice(0,8)

top8.forEach(val=>{
for(let i=0;i<20;i++){
let el=document.getElementById("g"+i)
if(parseFloat(el.value)===val && !el.classList.contains("top8")){
el.classList.add("top8")
break
}
}
})

save()
draw(full)
}

// ✅ NUOVO GRAFICO
function draw(list){

let clean = list.filter(v => v !== null)
let sorted = clean.slice().sort((a,b)=>a-b)
let top8 = sorted.slice(0,8)

let result = []

list.forEach(v=>{
  if(top8.includes(v)){
    result.push(v)
    let idx = top8.indexOf(v)
    top8.splice(idx,1)
  }
})

if(window.chart) window.chart.destroy()

window.chart = new Chart(grafico,{
  type:'line',
  data:{
    labels: result.map((_,i)=>i+1),
    datasets:[{
      data: result,
      borderColor:"green",
      backgroundColor:"rgba(0,128,0,0.2)",
      tension:0.3
    }]
  },
  options:{
    plugins:{legend:{display:false}},
    scales:{y:{reverse:true}}
  }
})

}

function simula(){

let full=getFull()
let base=full.filter(v=>v!==null)
if(base.length<8)return

lastState=full.slice()

let campoSel=campi.find(c=>c.nome===campo.value)
if(!campoSel)return

let cr=parseFloat(crManuale.value)
let slope=parseFloat(slopeManuale.value)

let dati = (!isNaN(cr)&&!isNaN(slope))
? {cr,slope}
: (campoSel.tee[tee.value]||campoSel.tee.giallo)

let stb=parseFloat(sim.value)
if(isNaN(stb))return

let hcpAttuale=calcHCP(base)
let score = dati.cr + (36 - stb) + hcpAttuale
let sd = (113/dati.slope)*(score-dati.cr)

let newList=full.slice()
let removed=newList.shift()
newList.push(sd)

lastSimulatedList=newList.slice()

let clean=newList.filter(v=>v!==null)

let old=calcHCP(base)
let next=calcHCP(clean)

hcp.innerText=next.toFixed(2)
draw(newList)
}

function conferma(){
if(!lastSimulatedList)return
for(let i=0;i<20;i++){
document.getElementById("g"+i).value=
lastSimulatedList[i]?lastSimulatedList[i].toFixed(2):""
}
save()
update()
}

function undo(){
if(!lastState)return
for(let i=0;i<20;i++){
document.getElementById("g"+i).value=
lastState[i]?lastState[i]:""
}
save()
update()
}

function save(){
for(let i=0;i<20;i++){
localStorage.setItem(userCorrente+"_g"+i,
document.getElementById("g"+i).value)
}}

function load(){
for(let i=0;i<20;i++){
let v=localStorage.getItem(userCorrente+"_g"+i)
if(v)document.getElementById("g"+i).value=v
}}

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js")
}

</script>

</body>
</html>
