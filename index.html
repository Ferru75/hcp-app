
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#e8f5e9;padding:12px}
.container{background:white;padding:15px;margin-bottom:12px;border-radius:14px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
input,select{width:100%;padding:10px;border-radius:8px;text-align:center}
button{width:100%;padding:10px;margin-top:10px;background:green;color:white;border:none}
.big{font-size:42px;text-align:center;font-weight:bold}
.hidden{display:none}
</style>
</head>

<body>

<div id="loginBox" class="container">
<h3>Login</h3>
<input id="user">
<input id="pass" type="password">
<button onclick="login()">Login</button>
<button onclick="register()">Crea</button>
</div>

<div id="app" class="hidden">

<div class="container">
<div class="grid" id="grid"></div>
</div>

<div class="container">
<div id="hcp" class="big">--</div>
</div>

<div class="container">

<select id="campo"></select>

<select id="tee">
<option value="">TEE</option>
<option value="giallo">Giallo</option>
<option value="bianco">Bianco</option>
</select>

<input id="sim" type="number" placeholder="Stableford">

<button onclick="simula()">Simula</button>

<div id="out"></div>

</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

</div>

<script>

let userCorrente=null
let campi=[]

// ✅ START
window.addEventListener("DOMContentLoaded",()=>{
let saved=localStorage.getItem("lastUser")
if(saved){userCorrente=saved;start()}
})

// ✅ LOGIN
function register(){
localStorage.setItem("u_"+user.value,btoa(pass.value))
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}

function login(){
if(localStorage.getItem("u_"+user.value)===btoa(pass.value)){
userCorrente=user.value
localStorage.setItem("lastUser",user.value)
start()
}
}

// ✅ START APP
function start(){
loginBox.classList.add("hidden")
app.classList.remove("hidden")
init()
}

// ✅ INIT
async function init(){

grid.innerHTML=""

for(let i=0;i<20;i++){
let el=document.createElement("input")
el.type="number"
el.step="0.1"
el.id="g"+i
el.oninput=update
grid.appendChild(el)
}

await loadCampi()

load()
update()
}

// ✅ LOAD CAMPI
async function loadCampi(){
let res=await fetch("campi.json")
campi=await res.json()

campo.innerHTML='<option value="">Campo</option>'

campi.sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(c=>{
let o=document.createElement("option")
o.value=c.nome
o.textContent=c.nome
campo.appendChild(o)
})
}

// ✅ PRENDI SCORE
function getData(){
let arr=[]
for(let i=0;i<20;i++){
let v=document.getElementById("g"+i).value
if(v)arr.push(parseFloat(v))
}
return arr
}

// ✅ CALCOLO HCP
function calc(list){
if(list.length<8)return null
let sorted=list.slice().sort((a,b)=>a-b)
let top8=sorted.slice(0,8)
return top8.reduce((a,b)=>a+b,0)/8
}

// ✅ UPDATE
function update(){
let list=getData()

if(list.length<8){
hcp.innerText="--"
return
}

let val=calc(list)
hcp.innerText=val.toFixed(2)

save()
draw(list)
}

// ✅ GRAFICO CORRETTO
function draw(list){
let values=[]
for(let i=8;i<=list.length;i++){
values.push(calc(list.slice(0,i)))
}

if(window.chart)chart.destroy()

window.chart=new Chart(grafico,{
type:'line',
data:{
labels:values.map((_,i)=>i+8),
datasets:[{data:values,borderColor:"green"}]
}
})
}

// ✅ SIMULAZIONE PERFETTA (QUESTA È LA PARTE IMPORTANTE)
function simula(){

let base=getData()

if(base.length<8){
out.innerText="Servono almeno 8 score"
return
}

let campoSel=campi.find(c=>c.nome===campo.value)
if(!campoSel){
out.innerText="Seleziona campo"
return
}

// ✅ TIENE IL TEE SELEZIONATO, ALTRIMENTI GIALLO
let dati = campoSel.tee[tee.value] || campoSel.tee.giallo

let stb=parseFloat(sim.value)
if(isNaN(stb)){
out.innerText="Inserisci Stableford"
return
}

// ✅ CALCOLO SD REALE
let sd=(dati.cr-72)+((113/dati.slope)*(36-stb))

// ✅ CLONA LISTA
let newList=base.slice()

// ✅ ESCE LA PIU VECCHIA
if(newList.length>=20) newList.shift()

// ✅ ENTRA NUOVA GARA
newList.push(sd)

// ✅ CALCOLO VECCHIO E NUOVO HCP
let oldHcp=calc(base)
let newHcp=calc(newList)

// ✅ VISUAL
out.innerHTML=
"Nuovo SD: "+sd.toFixed(2)+"<br>"+
"HCP: "+newHcp.toFixed(2)+"<br>"+
"Δ "+(newHcp-oldHcp).toFixed(2)

// ✅ UPDATE UI
hcp.innerText=newHcp.toFixed(2)
draw(newList)
}

// ✅ STORAGE
function save(){
for(let i=0;i<20;i++){
localStorage.setItem(userCorrente+"_g"+i,
document.getElementById("g"+i).value)
}}

function load(){
for(let i=0;i<20;i++){
let v=localStorage.getItem(userCorrente+"_g"+i)
if(v)document.getElementById("g"+i).value=v
}}

</script>

</body>
</html>
