
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#e8f5e9;margin:0}
.container{background:white;margin:10px;border-radius:14px;padding:14px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
input,select{width:100%;padding:10px;border-radius:8px;text-align:center;border:1px solid #ccc}
button{width:100%;padding:12px;background:green;color:white;border:none;border-radius:10px}
.big{font-size:48px;text-align:center;font-weight:bold}
.hidden{display:none}
.good{background:#c8e6c9}
.bad{background:#ffcdd2}
</style>
</head>

<body>

<div id="loginBox" class="container">
<h3>Login</h3>
<input id="user" placeholder="User">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Crea</button>
</div>

<div id="app" class="hidden">

<div class="container">
<div class="grid" id="grid"></div>
</div>

<div class="container">
<div id="hcp" class="big">--</div>
</div>

<div class="container">

<select id="campo"></select>

<select id="tee">
<option value="giallo">Giallo</option>
<option value="bianco">Bianco</option>
</select>

<input id="crManuale" type="number" step="0.1" placeholder="CR override">
<input id="slopeManuale" type="number" placeholder="Slope override">

<div id="infoCampo"></div>

<input id="sim" type="number" placeholder="Stableford">

<button onclick="simula()">Simula gara</button>

<div id="out"></div>
<div id="target"></div>

</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

</div>

<script>

let userCorrente=null
let campi=[]

window.addEventListener("DOMContentLoaded",()=>{
let saved=localStorage.getItem("lastUser")
if(saved){userCorrente=saved;start()}
})

// LOGIN
function register(){
if(!user.value || !pass.value)return
localStorage.setItem("u_"+user.value,btoa(pass.value))
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}

function login(){
if(localStorage.getItem("u_"+user.value)===btoa(pass.value)){
userCorrente=user.value
localStorage.setItem("lastUser",user.value)
start()
}
}

// START
function start(){
loginBox.classList.add("hidden")
app.classList.remove("hidden")
init()
}

// INIT
async function init(){
grid.innerHTML=""
for(let i=0;i<20;i++){
let el=document.createElement("input")
el.type="number"
el.step="0.1"
el.id="g"+i
el.oninput=update
grid.appendChild(el)
}
await loadCampi()
load()
update()
}

// CAMPI
async function loadCampi(){
let res=await fetch("campi.json")
campi=await res.json()

campo.innerHTML='<option value="">Campo</option>'

campi.forEach(c=>{
let o=document.createElement("option")
o.value=c.nome
o.textContent=c.nome
campo.appendChild(o)
})
}

campo.onchange=updateInfo
tee.onchange=updateInfo

function updateInfo(){
let c=campi.find(x=>x.nome===campo.value)
if(!c)return
let d=c.tee[tee.value]||c.tee.giallo
infoCampo.innerHTML="CR: "+d.cr+" | Slope: "+d.slope
}

// DATI
function getFull(){
let arr=[]
for(let i=0;i<20;i++){
let v=document.getElementById("g"+i).value
arr.push(v!=="" ? parseFloat(v) : null)
}
return arr
}

// CALCOLO
function calcFull(list){
let sorted=list.slice().sort((a,b)=>a-b)
let top8=sorted.slice(0,8)
let hcp=top8.reduce((a,b)=>a+b,0)/8
return {hcp,top8}
}

// UPDATE
function update(){

let full=getFull()
let clean=full.filter(v=>v!==null)

if(clean.length<8){
hcp.innerText="--"
return
}

let res=calcFull(clean)
hcp.innerText=res.hcp.toFixed(2)

// reset
for(let i=0;i<20;i++){
document.getElementById("g"+i).className=""
}

// TOP 8 verde
res.top8.forEach(val=>{
for(let i=0;i<20;i++){
let el=document.getElementById("g"+i)
if(parseFloat(el.value)===val && !el.classList.contains("good")){
el.classList.add("good")
break
}
}
})

save()
draw(clean)
}

// SIMULAZIONE + TARGET 🔥
function simula(){

let base=getFull().filter(v=>v!==null)
if(base.length<8)return

let campoSel=campi.find(c=>c.nome===campo.value)
if(!campoSel)return

let cr=parseFloat(crManuale.value)
let slope=parseFloat(slopeManuale.value)

let dati=!isNaN(cr)&&!isNaN(slope)
? {cr,slope}
: (campoSel.tee[tee.value]||campoSel.tee.giallo)

let stb=parseFloat(sim.value)
if(isNaN(stb))return

let sd=(dati.cr-72)+((113/dati.slope)*(36-stb))

let full=getFull()
let removed=full.shift()
full.push(sd)

let clean=full.filter(v=>v!==null)

let old=calcFull(base)
let next=calcFull(clean)

// badge risultato
let stato = ""
if(next.hcp<old.hcp) stato="🟢 SCENDI"
else if(next.hcp>old.hcp) stato="🔴 SALI"
else stato="⚪ STABILE"

// TARGET STB 🔥
let targetSTB = null

for(let t=20;t<=45;t++){
let testSD=(dati.cr-72)+((113/dati.slope)*(36-t))
let testList=base.slice()
if(testList.length>=20)testList.shift()
testList.push(testSD)
let testH=calcFull(testList).hcp
if(testH<old.hcp){
targetSTB=t
break
}
}

// OUTPUT
out.innerHTML=
"SD: "+sd.toFixed(2)+"<br>"+
"HCP: "+next.hcp.toFixed(2)+"<br>"+
stato

target.innerHTML= targetSTB
? "🎯 Devi fare almeno: "+targetSTB+" STB"
: "🔥 Devi fare gara alta (oltre 45 circa)"

// UPDATE UI
hcp.innerText=next.hcp.toFixed(2)

draw(clean)
}

// GRAFICO
function draw(list){
let values=[]
for(let i=8;i<=list.length;i++){
values.push(calcFull(list.slice(0,i)).hcp)
}
if(window.chart)window.chart.destroy()

window.chart=new Chart(grafico,{
type:'line',
data:{
labels:values.map((_,i)=>i+8),
datasets:[{data:values,borderColor:"green"}]
}
})
}

// STORAGE
function save(){
for(let i=0;i<20;i++){
localStorage.setItem(userCorrente+"_g"+i,
document.getElementById("g"+i).value)
}}

function load(){
for(let i=0;i<20;i++){
let v=localStorage.getItem(userCorrente+"_g"+i)
if(v)document.getElementById("g"+i).value=v
}}

</script>
</body>
</html>
