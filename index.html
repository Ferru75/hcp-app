
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#e8f5e9;padding:12px}
.container{background:white;padding:15px;margin-bottom:12px;border-radius:14px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;text-align:center}
button{width:100%;padding:10px;margin-top:10px;background:green;color:white;border:none}
.big{font-size:40px;text-align:center;font-weight:bold}
</style>
</head>

<body>

<div id="loginBox" class="container">
<h2>Login</h2>
<input id="user" placeholder="utente">
<input id="pass" type="password" placeholder="password">
<button onclick="login()">Login</button>
<button onclick="register()">Crea</button>
</div>

<div id="app" style="display:none">

<h2>⛳ HCP PRO</h2>

<div class="container">
<div class="grid" id="grid"></div>
</div>

<div class="container">
<div class="big" id="hcp">--</div>
</div>

<div class="container">
<h3>Prossima gara</h3>

<select id="campo"></select>

<select id="tee">
<option value="">TEE</option>
<option value="giallo">Giallo</option>
<option value="bianco">Bianco</option>
<option value="rosso">Rosso</option>
</select>

<input id="sim" placeholder="Stableford" type="number">

<button onclick="simulaPro()">Simula</button>

<div id="simOut"></div>
</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

</div>

<script>

let currentUser=null
let campiDB=[]

// ✅ AUTO LOGIN
window.onload=()=>{
let u=localStorage.getItem("lastUser")
if(u){currentUser=u;startApp()}
}

// ✅ LOGIN
function register(){
localStorage.setItem("u_"+user.value,btoa(pass.value))
localStorage.setItem("lastUser",user.value)
currentUser=user.value
startApp()
}

function login(){
if(localStorage.getItem("u_"+user.value)===btoa(pass.value)){
currentUser=user.value
localStorage.setItem("lastUser",user.value)
startApp()
}
}

// ✅ START APP
function startApp(){
loginBox.style.display="none"
app.style.display="block"
init()
}

// ✅ LOAD DB
async function loadCampi(){
let res=await fetch("campi.json")
campiDB=await res.json()

campo.innerHTML='<option>Seleziona campo</option>'

campiDB.sort((a,b)=>a.nome.localeCompare(b.nome)).forEach(c=>{
let o=document.createElement("option")
o.value=c.nome
o.textContent=c.nome
campo.appendChild(o)
})
}

// ===== INIT =====
function init(){
grid.innerHTML=""

for(let i=0;i<20;i++){
let el=document.createElement("input")
el.type="number"
el.step="0.1"
el.id="g"+i
el.oninput=aggiorna
grid.appendChild(el)
}

load()
loadCampi()
aggiorna()
}

// ===== DATA =====
function getData(){
let a=[]
for(let i=0;i<20;i++){
let v=document.getElementById("g"+i).value
if(v)a.push(parseFloat(v))
}
return a
}

// ===== CALCOLO =====
function calc(l){
if(l.length<8)return null
let s=l.slice().sort((a,b)=>a-b).slice(0,8)
return s.reduce((a,b)=>a+b,0)/8
}

// ===== UPDATE =====
function aggiorna(){
let list=getData()

if(list.length<8){hcp.innerText="--";return}

let val=calc(list)
hcp.innerText=val.toFixed(2)

save()
drawGraph(list)
}

// ===== GRAFICO =====
function drawGraph(list){

let values=[]
let temp=[]

for(let i=0;i<list.length;i++){
temp.push(list[i])
let h=calc(temp)
if(h!==null)values.push(h)
}

if(window.chart)chart.destroy()

window.chart=new Chart(grafico,{
type:'line',
data:{
labels:values.map((_,i)=>i+1),
datasets:[{data:values,borderColor:'green'}]
}
})
}

// ===== SIMULAZIONE CORRETTA =====
function simulaPro(){

let base=getData()
if(base.length<8){
simOut.innerText="Servono almeno 8 score"
return
}

let campoSel=campiDB.find(c=>c.nome===campo.value)
if(!campoSel){
simOut.innerText="Seleziona campo"
return
}

let teeSel=tee.value
let dati=campoSel.tee[teeSel]||campoSel.tee.giallo

let stb=parseFloat(sim.value)
if(isNaN(stb)){
simOut.innerText="Inserisci STB"
return
}

// ✅ SD CORRETTO
let sd=(dati.cr-72)+((113/dati.slope)*(36-stb))

let newList=base.slice()

if(newList.length>=20)newList.shift()

newList.push(sd)

// ✅ nuovo HCP
let oldHcp=calc(base)
let newHcp=calc(newList)

simOut.innerHTML=
"SD: "+sd.toFixed(2)+"<br>"+
"HCP: "+newHcp.toFixed(2)+"<br>"+
"Δ "+(newHcp-oldHcp).toFixed(2)

hcp.innerText=newHcp.toFixed(2)

drawGraph(newList)
}

// ===== STORAGE =====
function save(){
for(let i=0;i<20;i++){
localStorage.setItem(currentUser+"_g"+i,
document.getElementById("g"+i).value)
}}

function load(){
for(let i=0;i<20;i++){
let v=localStorage.getItem(currentUser+"_g"+i)
if(v)document.getElementById("g"+i).value=v
}}

</script>

</body>
</html>
