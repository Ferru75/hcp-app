
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background:#e8f5e9;
    margin:0;
    padding:12px;
}

h2 { text-align:center; color:#1B5E20; }

.container {
    background:white;
    padding:15px;
    margin-bottom:12px;
    border-radius:16px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.grid {
    display:grid;
    grid-template-columns: repeat(5,1fr);
    gap:6px;
}

input {
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    text-align:center;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:linear-gradient(45deg,#1B5E20,#43A047);
    color:white;
    border:none;
    border-radius:10px;
    font-weight:bold;
}

.big {
    font-size:40px;
    text-align:center;
    font-weight:bold;
    color:#1B5E20;
}

.highlight {
    border:2px solid gold !important;
}

.hidden { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="container">
    <h2>Login</h2>
    <input id="user" placeholder="Nome utente">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Accedi</button>
    <button onclick="register()">Crea profilo</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<h2>⛳ HCP PRO</h2>

<div class="container">
    <button onclick="logout()">Logout</button>
</div>

<div class="container">
    <b>Inserisci gli ultimi SD</b>
    <div class="grid" id="grid"></div>
</div>

<div class="container">
    <div class="big" id="hcp">--</div>
</div>

<div class="container">
    <input id="sim" type="number" step="0.1" placeholder="Nuovo HCP">
    <button onclick="simula()">Simula</button>
    <div id="simOut"></div>
</div>

<div class="container">
    <canvas id="grafico"></canvas>
</div>

</div>

<script>

let currentUser = null

// ===== REGISTER =====
function register(){
    let u=document.getElementById("user").value
    let p=document.getElementById("pass").value

    if(!u || !p) return alert("Inserisci dati")

    localStorage.setItem("user_"+u, p)
    alert("Profilo creato")
}

// ===== LOGIN =====
function login(){
    let u=document.getElementById("user").value
    let p=document.getElementById("pass").value

    let saved = localStorage.getItem("user_"+u)

    if(saved === p){
        currentUser = u
        startApp()
    } else {
        alert("Credenziali errate")
    }
}

function logout(){
    location.reload()
}

// ===== START =====
function startApp(){
    document.getElementById("loginBox").classList.add("hidden")
    document.getElementById("app").classList.remove("hidden")
    init()
}

// ===== CREA CASELLE =====
function init(){
    let grid=document.getElementById("grid")
    grid.innerHTML=""

    for(let i=0;i<20;i++){
        let el=document.createElement("input")
        el.id="g"+i
        el.type="number"
        el.step="0.1"

        el.addEventListener("input", aggiorna)

        grid.appendChild(el)
    }

    loadData()
    aggiorna()
}

// ===== STORAGE PER UTENTE =====
function key(name){
    return currentUser + "_" + name
}

function saveData(){
    for(let i=0;i<20;i++){
        localStorage.setItem(key("g"+i), document.getElementById("g"+i).value)
    }
}

function loadData(){
    for(let i=0;i<20;i++){
        let v=localStorage.getItem(key("g"+i))
        if(v) document.getElementById("g"+i).value=v
    }
}

// ===== DATI =====
function getData(){
    let arr=[]
    for(let i=0;i<20;i++){
        let v=document.getElementById("g"+i).value
        if(v!=="") arr.push(parseFloat(v))
    }
    return arr
}

// ===== CALCOLO =====
function calcHCP(list){
    if(list.length<8) return 0
    let sorted=[...list].sort((a,b)=>a-b)
    let top8=sorted.slice(0,8)
    return top8.reduce((a,b)=>a+b,0)/8
}

// ===== UPDATE =====
function aggiorna(){

    let list=getData()

    if(list.length<8){
        document.getElementById("hcp").innerText="--"
        return
    }

    let sorted=[...list].sort((a,b)=>a-b)
    let top8=sorted.slice(0,8)

    let hcp=calcHCP(list)
    document.getElementById("hcp").innerText=hcp.toFixed(2)

    // highlight
    let count={}
    top8.forEach(x=>count[x]=(count[x]||0)+1)

    for(let i=0;i<20;i++){
        let val=document.getElementById("g"+i).value
        let el=document.getElementById("g"+i)

        if(val!==""){
            let v=parseFloat(val)
            if(count[v]){
                el.classList.add("highlight")
                count[v]--
            } else el.classList.remove("highlight")
        } else el.classList.remove("highlight")
    }

    // grafico
    let andamento=[]
    for(let i=8;i<=list.length;i++){
        andamento.push(calcHCP(list.slice(0,i)))
    }

    if(window.chart) window.chart.destroy()

    window.chart=new Chart(document.getElementById("grafico"),{
        type:'line',
        data:{
            labels: andamento.map((_,i)=>i+8),
            datasets:[{data: andamento, borderColor:'green'}]
        }
    })

    saveData()
}

// ===== SIMULA =====
function simula(){

    let list=getData()
    let sd=parseFloat(document.getElementById("sim").value)

    if(isNaN(sd)) return

    let copy=[...list]
    if(copy.length>=20) copy.shift()
    copy.push(sd)

    let newHcp=calcHCP(copy)
    let oldHcp=calcHCP(list)

    let delta=newHcp-oldHcp
    let stato=delta<0?"🟢 SCENDI":"🔴 SALI"

    document.getElementById("simOut").innerHTML =
        "Nuovo HCP: "+newHcp.toFixed(2)+"<br>"+
        "Δ "+delta.toFixed(2)+" "+stato
}

</script>

</body>
</html>
