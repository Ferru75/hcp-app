
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#eef7ee;
margin:0;
}

.hidden{display:none;}

.container{
background:white;
margin:3px;
border-radius:10px;
padding:6px;
}

/* titolo */
.title{
text-align:center;
font-size:32px;
font-weight:bold;
margin:8px 0;
}

/* logout FIX */
.logoutBtn{
position:absolute;
top:8px;
right:8px;
padding:6px 10px;
font-size:12px;
border-radius:8px;
background:#2e7d32;
color:white;
border:none;
width:auto;
}

/* layout */
.mainRow{
display:flex;
gap:4px;
align-items:center;
}

/* grid */
.grid{
flex:1;
display:grid;
grid-template-columns:repeat(4, 1fr);
gap:2px;
}

/* sd */
.grid input{
font-size:11px;
height:34px;
text-align:center;
border-radius:6px;
border:1px solid #999;
}

/* selezione */
.selectedSD{
border:2px solid orange;
background:#fff3cd;
}

/* top8 */
.top8{
background:#c8e6c9;
}

/* controller */
#sdController{
width:34px;
flex-shrink:0;
display:flex;
flex-direction:column;
gap:4px;
}

#sdController button{
height:32px;
font-size:14px;
}

/* ✅ HCP PIÙ GRANDE */
.big{
font-size:42px;
text-align:center;
font-weight:bold;
}

/* ✅ STB */
#simBox{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin:10px 0;
}

#simBox button{
width:40px;
height:40px;
border-radius:50%;
font-size:18px;
}

#sim{
font-size:22px;
padding:6px 14px;
border-radius:8px;
color:white;
}

/* ✅ BOTTONI GRANDI */
button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#2e7d32;
color:white;
font-size:16px;
}

/* testo sopra */
.desc{
font-size:13px;
text-align:center;
margin-bottom:6px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="container">
<h2 class="title">HCP PRO</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Crea account</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="container" style="position:relative">
<h1 class="title">HCP PRO</h1>
<button class="logoutBtn" onclick="logout()">Logout</button>
</div>

<div class="container">

<p class="desc">
Inserisci i tuoi ultimi 20 risultati SD (score differential - li trovi su Federgolf) dal più vecchio al più recente. Clicca dentro il bottone e modifica con i tasti a destra.
</p>

<div class="mainRow">
<div class="grid" id="grid"></div>

<div id="sdController">
<button onclick="changeSelectedSD(-0.1)">−</button>
<button onclick="changeSelectedSD(0.1)">+</button>
</div>
</div>

</div>

<div class="container">
<div id="hcp" class="big">--</div>
</div>

<div class="container">

<div id="simBox">
<button onclick="changeSTB(-1)">−</button>
<div id="sim">36</div>
<button onclick="changeSTB(1)">+</button>
</div>

<button onclick="simula()">Simula gara</button>
<button onclick="conferma()">✅ Conferma risultato</button>
<button onclick="undo()">↩ Torna indietro</button>

</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

</div>

<script>
let userCorrente=null
let lastState=null
let lastSimulatedList=null
let stbValue=36
let selectedIndex=null

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js')
}

/* login */
function register(){
localStorage.setItem("u_"+user.value,btoa(pass.value))
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}

function login(){
if(localStorage.getItem("u_"+user.value)===btoa(pass.value)){
userCorrente=user.value
start()
}else alert("Credenziali errate")
}

function logout(){
location.reload()
}

function start(){
loginBox.style.display="none"
app.classList.remove("hidden")
init()
}

/* init */
function init(){
grid.innerHTML=""
for(let i=0;i<20;i++){
let el=document.createElement("input")
el.type="number"
el.step="0.1"
el.id="g"+i
el.onclick=()=>selectSD(i)
el.oninput=update
grid.appendChild(el)
}
update()
}

/* selezione */
function selectSD(i){
selectedIndex=i
document.querySelectorAll("#grid input").forEach(el=>el.classList.remove("selectedSD"))

let el=document.getElementById("g"+i)
el.classList.add("selectedSD")
el.focus()
}

/* modifica */
function changeSelectedSD(delta){
if(selectedIndex===null) return

let el=document.getElementById("g"+selectedIndex)
let val=parseFloat(el.value)
if(isNaN(val)) val=0

val+=delta
val=Math.max(0,Math.min(60,val))

el.value=val.toFixed(1)
update()
}

/* stb */
function changeSTB(d){
stbValue+=d
stbValue=Math.max(20,Math.min(45,stbValue))
sim.innerText=stbValue
updateSimColor()
}

/* hcp */
function calcHCP(list){
let sorted=list.slice().sort((a,b)=>a-b)
let top8=sorted.slice(0,8)
return top8.reduce((a,b)=>a+b,0)/8
}

/* ✅ grafico SOLO top 8 ordinati */
function getTop8Ordered(list){

let clean=list.filter(v=>v!==null)
let sorted=clean.slice().sort((a,b)=>a-b)
let best=sorted.slice(0,8)

let result=[]

list.forEach(v=>{
if(best.includes(v)){
result.push(v)
best.splice(best.indexOf(v),1)
}
})

return result
}

/* update */
function update(){

let list=[]
for(let i=0;i<20;i++){
let v=document.getElementById("g"+i).value
list.push(v?parseFloat(v):null)
}

let clean=list.filter(v=>v!==null)

if(clean.length<8){
hcp.innerText="--"
return
}

hcp.innerText=calcHCP(clean).toFixed(2)

/* highlight top8 */
document.querySelectorAll("input").forEach(i=>i.classList.remove("top8"))
let sorted=clean.slice().sort((a,b)=>a-b).slice(0,8)

sorted.forEach(val=>{
for(let i=0;i<20;i++){
let el=document.getElementById("g"+i)
if(parseFloat(el.value)===val && !el.classList.contains("top8")){
el.classList.add("top8")
break
}
}
})

draw(getTop8Ordered(list))
updateSimColor()
}

/* grafico */
function draw(data){

if(window.chart)window.chart.destroy()

window.chart=new Chart(grafico,{
type:'line',
data:{
labels:data.map((_,i)=>i+1),
datasets:[{
data:data,
borderColor:"green",
fill:false
}]
}
})
}

/* colori */
function updateSimColor(){

let list=[]
for(let i=0;i<20;i++){
let v=document.getElementById("g"+i).value
list.push(v?parseFloat(v):null)
}

let clean=list.filter(v=>v!==null)
if(clean.length<8) return

let oldH=calcHCP(clean)
let sd=(36-stbValue)+oldH

let newList=list.slice()
newList.shift()
newList.push(sd)

let newH=calcHCP(newList.filter(v=>v!==null))

if(newH>oldH) sim.style.background="#e53935"
else if(Math.abs(newH-oldH)<0.01) sim.style.background="#ff9800"
else sim.style.background="#2e7d32"
}

/* simula */
function simula(){

let list=[]
for(let i=0;i<20;i++){
let v=document.getElementById("g"+i).value
list.push(v?parseFloat(v):null)
}

let clean=list.filter(v=>v!==null)
if(clean.length<8)return

lastState=list.slice()

let sd=(36-stbValue)+calcHCP(clean)

list.shift()
list.push(sd)

lastSimulatedList=list

draw(getTop8Ordered(list))
}

/* ✅ UNDO FIXATO */
function undo(){
if(!lastState) return

for(let i=0;i<20;i++){
document.getElementById("g"+i).value = lastState[i] ?? ""
}

update()
}
</script>

</body>
</html>
