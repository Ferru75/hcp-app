
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HCP PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background:#e8f5e9;
    margin:0;
    padding:12px;
}

h2 {
    text-align:center;
    color:#1B5E20;
}

.container {
    background:white;
    padding:15px;
    margin-bottom:12px;
    border-radius:16px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.grid {
    display:grid;
    grid-template-columns: repeat(5,1fr);
    gap:6px;
}

input {
    width:100%;
    padding:12px;
    text-align:center;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:8px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:linear-gradient(45deg,#1B5E20,#43A047);
    color:white;
    border:none;
    border-radius:10px;
    font-weight:bold;
}

.big {
    font-size:40px;
    text-align:center;
    color:#1B5E20;
    font-weight:bold;
}

.highlight {
    border:2px solid gold !important;
}

.green {color:green;}
.red {color:red;}

.stat {text-align:center;margin-top:8px;}
</style>
</head>

<body>

<h2>⛳ HCP PRO</h2>

<div class="container">
    <b>Inserisci gli ultimi SD</b>
    <div class="grid" id="grid"></div>
</div>

<div class="container">
    <div class="big" id="hcp">--</div>
    <div class="stat" id="info"></div>
</div>

<div class="container">
    <input id="sim" type="number" step="0.1" placeholder="Nuovo SD">
    <button id="btnSim">Simula gara</button>
    <div class="stat" id="simRes"></div>
</div>

<div class="container">
    <canvas id="grafico"></canvas>
</div>

<script>

// ===== CREA CASELLE =====
for(let i=0;i<20;i++){
    let el=document.createElement("input")
    el.id="g"+i
    el.type="number"
    el.step="0.1"
    el.placeholder=i+1
    document.getElementById("grid").appendChild(el)
}

// ===== PRENDI DATI =====
function getData(){
    let arr=[]
    for(let i=0;i<20;i++){
        let v=document.getElementById("g"+i).value
        if(v!=="") arr.push(parseFloat(v))
    }
    return arr
}

// ===== HCP =====
function calcHCP(list){
    if(list.length<8) return null
    let sorted=[...list].sort((a,b)=>a-b)
    let top8=sorted.slice(0,8)
    return top8.reduce((a,b)=>a+b,0)/8
}

// ===== UPDATE =====
function aggiorna(){

    let list=getData()

    if(list.length<8){
        document.getElementById("hcp").innerText="--"
        document.getElementById("info").innerText="Inserisci almeno 8 SD"
        return
    }

    let sorted=[...list].sort((a,b)=>a-b)
    let top8=sorted.slice(0,8)

    let hcp=calcHCP(list)
    document.getElementById("hcp").innerText=hcp.toFixed(2)

    let worstTop8 = top8[top8.length-1]

    document.getElementById("info").innerText =
        "Worst Top 8: "+worstTop8.toFixed(2)

    // evidenzia top8 corretti
    let count={}
    top8.forEach(x=>count[x]=(count[x]||0)+1)

    for(let i=0;i<20;i++){
        let el=document.getElementById("g"+i)
        let val=el.value

        if(val!==""){
            let v=parseFloat(val)
            if(count[v]){
                el.classList.add("highlight")
                count[v]--
            } else el.classList.remove("highlight")
        } else el.classList.remove("highlight")
    }

    // grafico
    let andamento=[]
    for(let i=8;i<=list.length;i++){
        andamento.push(calcHCP(list.slice(0,i)))
    }

    if(window.chart) window.chart.destroy()
    window.chart=new Chart(document.getElementById("grafico"),{
        type:'line',
        data:{
            labels: andamento.map((_,i)=>i+8),
            datasets:[{data: andamento, borderColor:'green'}]
        },
        options:{plugins:{legend:{display:false}}}
    })
}

// ===== SIMULAZIONE =====
document.getElementById("btnSim").addEventListener("click",function(){

    let list=getData()
    let sd=parseFloat(document.getElementById("sim").value)

    if(isNaN(sd)) return

    if(list.length<8) return

    let copy=[...list]

    // rimuove la più vecchia
    if(copy.length>=20) copy.shift()

    copy.push(sd)

    let oldHcp=calcHCP(list)
    let newHcp=calcHCP(copy)

    let delta=newHcp-oldHcp

    let stato = delta<0 ? "🟢 SCENDI" : "🔴 SALI"

    let sorted=[...copy].sort((a,b)=>a-b)
    let worstNew=sorted.slice(0,8)[7]

    document.getElementById("simRes").innerHTML =
        "Nuovo HCP: "+newHcp.toFixed(2)+"<br>"+
        "Δ "+delta.toFixed(2)+" "+stato+"<br>"+
        "Nuovo Worst Top8: "+worstNew.toFixed(2)
})

// live update
document.addEventListener("input", aggiorna)

aggiorna()

</script>

</body>
</html>
