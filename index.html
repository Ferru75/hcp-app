
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#eef7ee;margin:0}
.container{background:white;margin:4px;border-radius:12px;padding:8px}
.hidden{display:none}

.title{text-align:center;font-size:34px;font-weight:bold}

.logoutBtn{
position:absolute;top:6px;right:6px;
padding:6px 10px;border-radius:8px;
background:#2e7d32;color:white;border:none;
}

/* grid */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}

.sdBtn{
height:42px;border-radius:8px;border:1px solid #999;
display:flex;align-items:center;justify-content:center;
background:#f3f3f3;
}

.top8{background:#c8e6c9}

/* hcp */
.big{
font-size:56px;height:90px;
display:flex;align-items:center;justify-content:center;
font-weight:bold;
}

/* stb */
#simBox{display:flex;justify-content:center;gap:15px;margin:10px}
#simBox button{width:46px;height:46px;border-radius:50%}

button{
width:100%;padding:14px;margin-top:8px;
border:none;border-radius:10px;
background:#2e7d32;color:white;font-size:18px;
}

/* select */
.selectorRow{display:flex;gap:6px}
.selectorRow select{flex:1;padding:6px;border-radius:8px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="container">
<h2 class="title">HCP PRO</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Crea account</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="container" style="position:relative">
<h1 class="title">HCP PRO</h1>
<button class="logoutBtn" onclick="logout()">Logout</button>
</div>

<div class="container">
<p>Inserisci i tuoi ultimi 20 SD</p>
<div class="grid" id="grid"></div>
</div>

<!-- CAMPI -->
<div class="container">
<div class="selectorRow">
<select id="campo"></select>
<select id="tee"></select>
</div>
</div>

<div class="container">
<div id="hcp" class="big">--</div>
</div>

<div class="container">

<div id="simBox">
<button onclick="changeSTB(-1)">−</button>
<div id="sim">36</div>
<button onclick="changeSTB(1)">+</button>
</div>

<button onclick="simula()">Simula gara</button>
<button onclick="conferma()">✅ Conferma</button>
<button onclick="undo()">↩ Undo</button>

</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

</div>

<script>
let data=new Array(20).fill(null)
let simulatedData=null
let lastState=null
let stbValue=36
let userCorrente=null

let campiData=[]

/* LOGIN */
function register(){
localStorage.setItem("u_"+user.value,btoa(pass.value))
userCorrente=user.value
start()
}

function login(){
if(localStorage.getItem("u_"+user.value)===btoa(pass.value)){
userCorrente=user.value
start()
}else alert("Errore login")
}

function logout(){
userCorrente=null
location.reload()
}

function start(){
loginBox.classList.add("hidden")
app.classList.remove("hidden")
init()
load()
update()
}

/* CAMPI */
async function loadCampi(){
let res=await fetch("campi.json")
campiData=await res.json()

campo.innerHTML=""
campiData.forEach((c,i)=>{
let o=document.createElement("option")
o.value=i
o.textContent=c.nome
campo.appendChild(o)
})
}

campo.addEventListener("change",()=>{
tee.innerHTML=""
let t=campiData[campo.value].tee
Object.keys(t).forEach(k=>{
let o=document.createElement("option")
o.value=k
o.textContent=k
tee.appendChild(o)
})
})

/* SD */
function init(){
grid.innerHTML=""
for(let i=0;i<20;i++){

let el=document.createElement("div")
el.className="sdBtn"
el.innerText="--"

el.onclick=()=>changeSD(i,-0.1)

let interval

el.onmousedown=()=>{
interval=setInterval(()=>changeSD(i,0.1),50)
}
el.onmouseup=()=>clearInterval(interval)
el.onmouseleave=()=>clearInterval(interval)
el.ontouchstart=()=>{
interval=setInterval(()=>changeSD(i,0.1),50)
}
el.ontouchend=()=>clearInterval(interval)

grid.appendChild(el)
}
loadCampi()
}

/* UPDATE */
function update(){

let base=simulatedData||data
let clean=base.filter(v=>v!==null)

hcp.innerText=clean.length<8?"--":calcHCP(clean).toFixed(2)

/* top8 FIX MIGLIORE */
document.querySelectorAll(".sdBtn").forEach(el=>el.classList.remove("top8"))

let sorted=[...clean].sort((a,b)=>a-b).slice(0,8)

let used=[]

sorted.forEach(val=>{
for(let i=0;i<base.length;i++){
if(base[i]===val && !used.includes(i)){
grid.children[i].classList.add("top8")
used.push(i)
break
}
}
})

document.querySelectorAll(".sdBtn").forEach((el,i)=>{
el.innerText=data[i]!=null?data[i].toFixed(1):"--"
})

draw(base)
save()
}

/* HCP */
function calcHCP(list){
let s=[...list].sort((a,b)=>a-b).slice(0,8)
return s.reduce((a,b)=>a+b,0)/8
}

/* SD CHANGE */
function changeSD(i,d){
if(data[i]==null)data[i]=0
data[i]+=d
data[i]=Math.round(data[i]*10)/10
update()
}

/* SIMULAZIONE */
function simula(){
let clean=data.filter(v=>v!==null)
if(clean.length<8)return

lastState=[...data]
let sd=(36-stbValue)+calcHCP(clean)

simulatedData=[...data.slice(1),sd]
update()
}

function conferma(){
if(!simulatedData)return
data=[...simulatedData]
simulatedData=null
update()
}

function undo(){
if(!lastState)return
data=[...lastState]
simulatedData=null
update()
}

/* STB */
function changeSTB(d){
stbValue+=d
stbValue=Math.max(0,Math.min(70,stbValue))
sim.innerText=stbValue
}

/* STORAGE */
function save(){
localStorage.setItem(userCorrente+"_data",JSON.stringify(data))
}
function load(){
let d=localStorage.getItem(userCorrente+"_data")
if(d)data=JSON.parse(d)
}

/* GRAFICO */
function draw(list){
let clean=list.filter(v=>v!==null)
if(clean.length<8)return

let sorted=[...clean].sort((a,b)=>a-b).slice(0,8)

if(window.chart)window.chart.destroy()

window.chart=new Chart(grafico,{
type:'line',
data:{
labels:sorted.map((_,i)=>i+1),
datasets:[{
label:"Trend migliori 8",
data:sorted,
borderColor:"green"
}]
}
})
}
</script>

</body>
</html>
