
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#eef7ee;
margin:0;
}

/* LAYOUT */
.container{
background:white;
margin:6px;
border-radius:12px;
padding:10px;
}

.hidden{display:none;}

.mainRow{
display:flex;
gap:6px;
align-items:center;
}

/* GRID SD */
.grid{
flex:1;
display:grid;
grid-template-columns:repeat(4, 1fr);
gap:4px;
}

.grid input{
font-size:12px;
height:28px;
text-align:center;
border-radius:5px;
border:1px solid #ccc;
}

/* SELEZIONE */
.selectedSD{
border:2px solid orange;
background:#fff3cd;
}

/* TOP 8 */
.top8{
background:#c8e6c9;
}

/* CONTROLLER */
#sdController{
display:flex;
flex-direction:column;
gap:6px;
}

#sdController button{
width:40px;
height:40px;
font-size:18px;
border-radius:8px;
background:#2e7d32;
color:white;
border:none;
}

/* HCP */
.big{
font-size:36px;
text-align:center;
font-weight:bold;
}

/* SIMULAZIONE */
#simBox{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin:10px 0;
}

#simBox button{
width:40px;
height:40px;
border-radius:50%;
background:#2e7d32;
color:white;
border:none;
font-size:20px;
}

#sim{
font-size:22px;
font-weight:bold;
background:#ff9800;
color:white;
padding:6px 12px;
border-radius:8px;
}

/* BOTTONI */
button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:8px;
background:#2e7d32;
color:white;
}

h1,h2,p{
text-align:center;
margin:6px 0;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="container">
<h2>HCP PRO</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Crea account</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="container" style="position:relative">
<h1>HCP PRO</h1>

<button onclick="logout()" style="position:absolute;top:8px;right:8px;width:auto;padding:4px 8px;font-size:11px;">
Logout
</button>
</div>

<div class="container">
<div class="mainRow">
<div class="grid" id="grid"></div>

<div id="sdController">
<button onclick="changeSelectedSD(-0.1)">−</button>
<button onclick="changeSelectedSD(0.1)">+</button>
</div>
</div>
</div>

<div class="container">
<div id="hcp" class="big">--</div>
</div>

<div class="container">
<div id="simBox">
<button onclick="changeSTB(-1)">−</button>
<div id="sim">36</div>
<button onclick="changeSTB(1)">+</button>
</div>

<button onclick="simula()">Simula gara</button>
<button onclick="conferma()">✅ Conferma risultato</button>
<button onclick="undo()">↩ Torna indietro</button>
</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

</div>

<script>
let userCorrente=null
let lastState=null
let lastSimulatedList=null
let stbValue=36
let selectedIndex=null

function register(){
localStorage.setItem("u_"+user.value,btoa(pass.value))
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}

function login(){
if(localStorage.getItem("u_"+user.value)===btoa(pass.value)){
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}else alert("Credenziali errate")
}

function logout(){
localStorage.removeItem("lastUser")
location.reload()
}

function start(){
loginBox.style.display="none"
app.classList.remove("hidden")
init()
}

function init(){
grid.innerHTML=""
for(let i=0;i<20;i++){
let el=document.createElement("input")
el.type="number"
el.step="0.1"
el.id="g"+i

el.onclick=()=>selectSD(i)
el.oninput=update

grid.appendChild(el)
}
load()
update()
}

function selectSD(i){
selectedIndex=i
document.querySelectorAll("#grid input").forEach(el=>el.classList.remove("selectedSD"))
document.getElementById("g"+i).classList.add("selectedSD")
}

function changeSelectedSD(delta){
if(selectedIndex===null) return
let el=document.getElementById("g"+selectedIndex)
let val=parseFloat(el.value)
if(isNaN(val)) val=0
val+=delta
if(val<0) val=0
if(val>60) val=60
el.value=val.toFixed(1)
update()
}

function changeSTB(d){
stbValue+=d
if(stbValue<20)stbValue=20
if(stbValue>45)stbValue=45
sim.innerText=stbValue
}

function getFull(){
let arr=[]
for(let i=0;i<20;i++){
let v=document.getElementById("g"+i).value
arr.push(v!==""?parseFloat(v):null)
}
return arr
}

function calcHCP(list){
let sorted=list.slice().sort((a,b)=>a-b)
let top8=sorted.slice(0,8)
return top8.reduce((a,b)=>a+b,0)/8
}

function update(){
let full=getFull()
let clean=full.filter(v=>v!==null)

if(clean.length<8){
hcp.innerText="--"
return
}

let h=calcHCP(clean)
hcp.innerText=h.toFixed(2)

document.querySelectorAll("input").forEach(i=>i.classList.remove("top8"))

let sorted=clean.slice().sort((a,b)=>a-b)
let top8=sorted.slice(0,8)

top8.forEach(val=>{
for(let i=0;i<20;i++){
let el=document.getElementById("g"+i)
if(parseFloat(el.value)===val && !el.classList.contains("top8")){
el.classList.add("top8")
break
}
}
})

save()
draw(full)
}

function draw(list){
let clean=list.filter(v=>v!==null)
if(clean.length===0) return

if(window.chart)window.chart.destroy()

window.chart=new Chart(document.getElementById("grafico"),{
type:'line',
data:{
labels:clean.map((_,i)=>i+1),
datasets:[{
data:clean,
borderColor:"green",
fill:false
}]
},
options:{
plugins:{legend:{display:false}},
responsive:true
}
})
}

function simula(){
let full=getFull()
let base=full.filter(v=>v!==null)
if(base.length<8)return

let old=calcHCP(base)
let sd=(36-stbValue)+old

let newList=full.slice()
newList.shift()
newList.push(sd)

lastSimulatedList=newList

let next=calcHCP(newList.filter(v=>v!==null))
hcp.innerText=next.toFixed(2)
draw(newList)
}

function conferma(){
if(!lastSimulatedList) return

lastState=getFull()

for(let i=0;i<20;i++){
document.getElementById("g"+i).value = lastSimulatedList[i] ?? ""
}

lastSimulatedList=null
update()
}

function undo(){
if(!lastState) return

for(let i=0;i<20;i++){
document.getElementById("g"+i).value = lastState[i] ?? ""
}

update()
}

function save(){
for(let i=0;i<20;i++){
localStorage.setItem(userCorrente+"_g"+i,document.getElementById("g"+i).value)
}
}

function load(){
for(let i=0;i<20;i++){
let v=localStorage.getItem(userCorrente+"_g"+i)
if(v) document.getElementById("g"+i).value=v
}
}
</script>

</body>
</html>
