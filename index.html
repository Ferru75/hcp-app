
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HCP PRO</title>

<!-- ✅ FIX PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#eef7ee;
margin:0;
}

.container{
background:white;
margin:4px;
border-radius:12px;
padding:8px;
}

.title{
text-align:center;
font-size:34px;
font-weight:bold;
margin:8px 0;
}

.logoutBtn{
position:absolute;
top:6px;
right:6px;
padding:6px 10px;
font-size:12px;
border-radius:8px;
background:#2e7d32;
color:white;
border:none;
width:auto;
}

.selectorRow{
display:flex;
gap:6px;
}

.selectorRow select{
flex:1;
padding:6px;
border-radius:8px;
}

.infoRow{
display:flex;
gap:6px;
margin-top:6px;
}

.infoRow button{
flex:1;
padding:8px;
font-size:14px;
background:#607d8b;
}

.desc{
font-size:14px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:4px;
}

.sdBtn{
height:42px;
border-radius:8px;
border:1px solid #999;
display:flex;
align-items:center;
justify-content:center;
background:#f3f3f3;
}

.top8{background:#c8e6c9;}

.big{
font-size:56px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
height:90px;
}

#simBox{
display:flex;
justify-content:center;
gap:15px;
margin:10px;
}

#simBox button{
width:46px;height:46px;
border-radius:50%;
}

#sim{
font-size:22px;
padding:8px 16px;
border-radius:10px;
color:white;
background:#ff9800;
}

button{
width:100%;
padding:14px;
margin-top:8px;
border:none;
border-radius:10px;
background:#2e7d32;
color:white;
font-size:18px;
}
</style>
</head>

<body>

<div class="container" style="position:relative">
<h1 class="title">HCP PRO</h1>
<button class="logoutBtn">Logout</button>
</div>

<div class="container">
<p class="desc">
Tap = -0.1 • Tieni premuto = incremento veloce
</p>
<div class="grid" id="grid"></div>
</div>

<div class="container">
<div class="selectorRow">
<select id="campo"></select>
<select id="tee"></select>
</div>

<div class="infoRow">
<button onclick="modCR()">CR: <span id="crVal">--</span></button>
<button onclick="modSlope()">Slope: <span id="slopeVal">--</span></button>
</div>
</div>

<div class="container">
<div id="hcp" class="big">--</div>
</div>

<div class="container">

<div id="simBox">
<button onclick="changeSTB(-1)">−</button>
<div id="sim">36</div>
<button onclick="changeSTB(1)">+</button>
</div>

<button onclick="simula()">Simula gara</button>
<button onclick="conferma()">✅ Conferma</button>
<button onclick="undo()">↩ Undo</button>

</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

<script>
let data = new Array(20).fill(null)
let stbValue = 36
let lastState = null

let campiData=[]
let currentCR=null
let currentSlope=null

/* ✅ CARICA CAMPI */
async function loadCampi(){
let res = await fetch("campi.json")
campiData = await res.json()

campo.innerHTML='<option value="">Campo</option>'

campiData.forEach((c,i)=>{
let opt=document.createElement("option")
opt.value=i
opt.textContent=c.nome
campo.appendChild(opt)
})
}

/* campo */
campo.addEventListener("change",()=>{
let idx=campo.value
tee.innerHTML=""

if(idx==="") return

let tees=campiData[idx].tee

Object.keys(tees).forEach(t=>{
let opt=document.createElement("option")
opt.value=t
opt.textContent=t.toUpperCase()
tee.appendChild(opt)
})
})

/* tee */
tee.addEventListener("change",()=>{
let c=campo.value
let t=tee.value
if(!c||!t) return

let info=campiData[c].tee[t]

currentCR=info.cr
currentSlope=info.slope

updateCRSlope()
})

function updateCRSlope(){
crVal.innerText=currentCR ?? "--"
slopeVal.innerText=currentSlope ?? "--"
}

function modCR(){
if(currentCR===null)return
currentCR=parseFloat(prompt("Modifica CR",currentCR))
updateCRSlope()
}

function modSlope(){
if(currentSlope===null)return
currentSlope=parseFloat(prompt("Modifica slope",currentSlope))
updateCRSlope()
}

/* SD */
function init(){
for(let i=0;i<20;i++){

let el=document.createElement("div")
el.className="sdBtn"
el.innerText="--"

let interval=null
let speed=120

el.onclick=()=>changeSD(i,-0.1)

function start(){
stop()
interval=setInterval(()=>{
changeSD(i,0.1)
if(speed>40){
speed-=15
clearInterval(interval)
interval=setInterval(()=>changeSD(i,0.1),speed)
}
},speed)
}

function stop(){
if(interval){
clearInterval(interval)
interval=null
speed=120
}
}

el.onmousedown=start
el.onmouseup=stop
el.onmouseleave=stop
el.ontouchstart=start
el.ontouchend=stop

grid.appendChild(el)
}
}

init()
loadCampi()

function changeSD(i,d){
if(data[i]===null)data[i]=0
data[i]+=d
data[i]=Math.round(data[i]*10)/10
data[i]=Math.max(0,Math.min(60,data[i]))
update()
}

function calcHCP(list){
let s=list.slice().sort((a,b)=>a-b).slice(0,8)
return s.reduce((a,b)=>a+b,0)/8
}

function getTop8(list){
let sorted=list.slice().sort((a,b)=>a-b).slice(0,8)
let r=[]
list.forEach(v=>{
if(sorted.includes(v)){
r.push(v)
sorted.splice(sorted.indexOf(v),1)
}
})
return r
}

function update(){

let clean=data.filter(v=>v!==null)

hcp.innerText=clean.length<8?"--":calcHCP(clean).toFixed(2)

document.querySelectorAll(".sdBtn").forEach((el,i)=>{
el.innerText = data[i] !== null ? data[i].toFixed(1) : "--"
el.classList.remove("top8")
})

let sorted=clean.slice().sort((a,b)=>a-b).slice(0,8)

sorted.forEach(val=>{
for(let i=0;i<data.length;i++){
if(data[i]===val){
grid.children[i].classList.add("top8")
break
}
}
})

draw(getTop8(clean))
updateSimColor()
}

/* grafico */
function draw(d){
if(d.length===0)return

if(window.chart)window.chart.destroy()

window.chart=new Chart(grafico,{
type:'line',
data:{
labels:d.map((_,i)=>i+1),
datasets:[{
label:"Trend ultimi 8 risultati validi per handicap",
data:d,
borderColor:"green"
}]
}
})
}

/* ✅ FIX SHIFT CORRETTO */
function simula(){

let clean=data.filter(v=>v!==null)
if(clean.length<8)return

lastState=[...data]

let sd=(36-stbValue)+calcHCP(clean)

/* ✅ SHIFT PERFETTO */
data=[...data.slice(1), sd]

update()
}

function undo(){
if(!lastState)return
data=[...lastState]
update()
}

function conferma(){
lastState=null
}

function changeSTB(d){
stbValue+=d
stbValue=Math.max(20,Math.min(45,stbValue))
sim.innerText=stbValue
updateSimColor()
}

function updateSimColor(){
let clean=data.filter(v=>v!==null)
if(clean.length<8)return

let old=calcHCP(clean)
let sd=(36-stbValue)+old

let newList=[...data]
newList.shift()
newList.push(sd)

let newH=calcHCP(newList.filter(v=>v!==null))

if(newH>old) sim.style.background="#e53935"
else if(Math.abs(newH-old)<0.01) sim.style.background="#ff9800"
else sim.style.background="#2e7d32"
}
</script>

</body>
</html>
