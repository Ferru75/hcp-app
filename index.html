
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HCP Golf Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B5E20">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    padding: 15px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #1B5E20;
    color: white;
    border: none;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

.big {
    font-size: 30px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>⛳ HCP Golf Pro</h2>

<div>
    HCP: <span id="hcp" class="big">0</span>
</div>

<input type="number" id="stb" placeholder="STB">
<button onclick="aggiungi()">Aggiungi gara</button>

<textarea id="importText" placeholder="Incolla risultati"></textarea>
<button onclick="importa()">Importa</button>

<input type="number" id="simulaStb" placeholder="Simula STB">
<button onclick="simula()">Simula</button>

<div id="simulaOutput"></div>

<canvas id="grafico"></canvas>

<script>

let data = JSON.parse(localStorage.getItem("hcp")) || []

function salva() {
    localStorage.setItem("hcp", JSON.stringify(data))
}

function hcpCalc(arr){
    if(arr.length<8) return 0
    return arr.sort((a,b)=>a-b).slice(0,8).reduce((a,b)=>a+b,0)/8
}

function aggiungi(){
    let stb = parseInt(document.getElementById("stb").value)
    if(!stb) return
    if(data.length>=20) data.shift()
    data.push(36-stb)
    salva()
    aggiorna()
}

function importa(){
    let txt=document.getElementById("importText").value
    let nums = txt.match(/\d{2}/g)
    if(!nums) return

    nums.forEach(n=>{
        if(data.length>=20) data.shift()
        data.push(36-parseInt(n))
    })

    salva()
    aggiorna()
}

function simula(){
    let stb=parseInt(document.getElementById("simulaStb").value)
    if(!stb) return

    let copy=[...data]
    if(copy.length>=20) copy.shift()
    copy.push(36-stb)

    let res = hcpCalc(copy)
    document.getElementById("simulaOutput").innerText="Nuovo HCP: "+res.toFixed(2)
}

function aggiorna(){
    let val = hcpCalc(data)
    document.getElementById("hcp").innerText=val.toFixed(2)

    let ctx=document.getElementById("grafico")

    let andamento=data.map((_,i)=>hcpCalc(data.slice(0,i+1)))

    if(window.chart) window.chart.destroy()

    window.chart=new Chart(ctx,{
        type:'line',
        data:{
            labels: andamento.map((_,i)=>i+1),
            datasets:[{data:andamento,borderColor:'green'}]
        }
    })
}

aggiorna()

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
}

</script>

</body>
</html>
