
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#eef7ee;
margin:0;
}

.hidden{display:none;}

.container{
background:white;
margin:3px;
border-radius:10px;
padding:6px;
}

/* titolo */
.title{
text-align:center;
font-size:34px;
font-weight:bold;
margin:8px 0;
}

/* logout */
.logoutBtn{
position:absolute;
top:6px;
right:6px;
padding:6px 10px;
font-size:12px;
border-radius:8px;
width:auto;
}

/* layout */
.mainRow{
display:flex;
gap:4px;
align-items:center;
}

/* ✅ FIX: 4 colonne REALI */
.grid{
flex:1;
display:grid;
grid-template-columns:repeat(4, minmax(0,1fr));
gap:2px;
}

/* SD */
.grid input{
font-size:11px;
height:36px;
text-align:center;
border-radius:6px;
border:1px solid #999;
width:100%;
}

/* selezione */
.selectedSD{
border:2px solid orange;
}

/* top8 */
.top8{
background:#c8e6c9;
}

/* controller */
#sdController{
width:32px;
flex-shrink:0;
display:flex;
flex-direction:column;
gap:4px;
}

#sdController button{
height:32px;
}

/* ✅ HCP grande */
.big{
font-size:44px;
text-align:center;
font-weight:bold;
}

/* STB */
#simBox{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
margin:12px 0;
}

#simBox button{
width:44px;
height:44px;
border-radius:50%;
font-size:18px;
}

#sim{
font-size:24px;
padding:6px 16px;
border-radius:10px;
color:white;
background:#ff9800;
}

/* bottoni */
button{
width:100%;
padding:14px;
margin-top:8px;
border:none;
border-radius:10px;
background:#2e7d32;
color:white;
font-size:18px;
}

/* testo */
.desc{
font-size:14px;
text-align:center;
}
</style>
</head>

<body>

<!-- APP -->
<div id="app">

<div class="container" style="position:relative">
<h1 class="title">HCP PRO</h1>
<button class="logoutBtn">Logout</button>
</div>

<div class="container">

<p class="desc">
Inserisci i tuoi ultimi 20 risultati SD (score differential - li trovi su Federgolf) dal più vecchio al più recente.
<br>Clicca dentro il bottone e cambia l'SD con i tasti a destra.
</p>

<div class="mainRow">

<div class="grid" id="grid"></div>

<div id="sdController">
<button onclick="changeSelectedSD(-0.1)">−</button>
<button onclick="changeSelectedSD(0.1)">+</button>
</div>

</div>
</div>

<div class="container">
<div id="hcp" class="big">--</div>
</div>

<div class="container">

<div id="simBox">
<button onclick="changeSTB(-1)">−</button>
<div id="sim">36</div>
<button onclick="changeSTB(1)">+</button>
</div>

<button onclick="simula()">Simula gara</button>
<button onclick="conferma()">✅ Conferma risultato</button>
<button onclick="undo()">↩ Torna indietro</button>

</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

</div>

<script>
let selectedIndex=null
let stbValue=36
let lastState=null
let lastSimulatedList=null

function init(){
for(let i=0;i<20;i++){
let el=document.createElement("input")
el.step="0.1"
el.id="g"+i
el.onclick=()=>selectSD(i)
el.oninput=update
grid.appendChild(el)
}
}

init()

function selectSD(i){
selectedIndex=i
document.querySelectorAll("#grid input").forEach(el=>el.classList.remove("selectedSD"))
document.getElementById("g"+i).classList.add("selectedSD")
}

/* modifica */
function changeSelectedSD(d){
if(selectedIndex===null) return
let el=document.getElementById("g"+selectedIndex)
let val=parseFloat(el.value)||0
val+=d
val=Math.max(0,Math.min(60,val))
el.value=val.toFixed(1)
update()
}

/* stb */
function changeSTB(d){
stbValue+=d
stbValue=Math.max(20,Math.min(45,stbValue))
sim.innerText=stbValue
updateSimColor()
}

/* hcp */
function calcHCP(list){
let s=list.slice().sort((a,b)=>a-b).slice(0,8)
return s.reduce((a,b)=>a+b,0)/8
}

/* top8 cronologico */
function getTop8(list){
let sorted=list.slice().sort((a,b)=>a-b).slice(0,8)
let res=[]
list.forEach(v=>{
if(sorted.includes(v)){
res.push(v)
sorted.splice(sorted.indexOf(v),1)
}
})
return res
}

function getList(){
let arr=[]
for(let i=0;i<20;i++){
let v=document.getElementById("g"+i).value
arr.push(v?parseFloat(v):null)
}
return arr
}

function update(){

let list=getList()
let clean=list.filter(v=>v!==null)

if(clean.length<8){
hcp.innerText="--"
return
}

hcp.innerText=calcHCP(clean).toFixed(2)

/* top8 highlight */
document.querySelectorAll("input").forEach(i=>i.classList.remove("top8"))
let s=clean.slice().sort((a,b)=>a-b).slice(0,8)

s.forEach(val=>{
for(let i=0;i<20;i++){
let el=document.getElementById("g"+i)
if(parseFloat(el.value)===val && !el.classList.contains("top8")){
el.classList.add("top8")
break
}
}
})

draw(getTop8(clean))
updateSimColor()
}

function draw(data){
if(window.chart)window.chart.destroy()
window.chart=new Chart(grafico,{
type:'line',
data:{
labels:data.map((_,i)=>i+1),
datasets:[{data:data,borderColor:"green"}]
}
})
}

/* simula */
function simula(){

let list=getList()
let clean=list.filter(v=>v!==null)
if(clean.length<8)return

lastState=list.slice()

let h=calcHCP(clean)
let sd=(36-stbValue)+h

list.shift()
list.push(sd)

lastSimulatedList=list

hcp.innerText=calcHCP(list).toFixed(2)
draw(getTop8(list))
}

/* conferma */
function conferma(){
if(!lastSimulatedList) return
for(let i=0;i<20;i++){
document.getElementById("g"+i).value = lastSimulatedList[i] ?? ""
}
update()
}

/* ✅ UNDO */
function undo(){
if(!lastState) return
for(let i=0;i<20;i++){
document.getElementById("g"+i).value = lastState[i] ?? ""
}
update()
}

/* colori */
function updateSimColor(){
let list=getList()
let clean=list.filter(v=>v!==null)
if(clean.length<8) return

let old=calcHCP(clean)
let sd=(36-stbValue)+old

let newList=list.slice()
newList.shift()
newList.push(sd)

let newH=calcHCP(newList.filter(v=>v!==null))

if(newH>old) sim.style.background="#e53935"
else if(Math.abs(newH-old)<0.01) sim.style.background="#ff9800"
else sim.style.background="#2e7d32"
}
</script>

</body>
</html>
