
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCP PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#e8f5e9;margin:0}

.container{
background:white;
margin:10px;
border-radius:14px;
padding:12px;
}

/* 🔴 LOGIN FIX */
#app{display:none}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
}

/* BOTTONI SD */
.sdBtn{
height:44px;
border-radius:10px;
border:1px solid #aaa;
display:flex;
align-items:center;
justify-content:center;
background:#eee;
font-size:14px;
}

.top8{background:#c8e6c9}
.warning{background:#ffcdd2}

button{
margin-top:6px;
width:100%;
padding:12px;
background:green;
color:white;
border:none;
border-radius:10px;
}

/* ✅ LOGOUT FIX */
.logoutBtn{
position:absolute;
top:8px;
right:8px;
width:auto !important;
padding:6px 12px;
}

.big{
font-size:50px;
text-align:center;
font-weight:bold;
}

#simBox{
display:flex;
justify-content:center;
gap:15px;
margin:10px;
}

#sim{
font-size:22px;
padding:8px 16px;
border-radius:10px;
background:#ff9800;
color:white;
}

/* SPLASH */
#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#2e7d32;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
z-index:9999;
}
</style>
</head>

<body>

<div id="splash">HCP PRO ⛳</div>

<!-- LOGIN -->
<div id="loginBox" class="container">
<h2 style="text-align:center;">HCP PRO</h2>
<p style="text-align:center;">Accedi o crea account</p>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Crea account</button>
</div>

<!-- APP -->
<div id="app">

<div class="container" style="position:relative">
<h1 style="text-align:center;">HCP PRO</h1>

<button class="logoutBtn" onclick="logout()">Logout</button>

<p style="text-align:center;font-size:14px">
Inserisci i tuoi ultimi 20 risultati SD (Federgolf) dal più vecchio al più recente.<br>
Tap = −0.1 • Tieni premuto = + veloce
</p>
</div>

<div class="container">
<div id="grid" class="grid"></div>
</div>

<div class="container">
<div id="hcp" class="big">--</div>
</div>

<!-- ✅ CAMPO + TEE -->


<div class="container">

<div class="selectorRow">
<select id="campo"></select>

<select id="tee">
<option value="giallo">Giallo</option>
<option value="bianco">Bianco</option>
<option value="rosso">Rosso</option>
</select>
</div>

<div class="inputRow">
<input id="crManuale" type="number" step="0.1" placeholder="CR override">
<input id="slopeManuale" type="number" placeholder="Slope override">
</div>

<div id="infoCampo"></div>

</div>


<!-- ✅ STB -->
  
<p style="text-align:center;font-size:14px">
Seleziona il punteggio stableford e poi clicca su Simula gara!
</p>

<div class="container">

<div id="simBox">
<button onclick="changeSTB(-1)">−</button>

<div id="sim">36</div>

<button onclick="changeSTB(1)">+</button>
</div>

<button onclick="simula()">Simula gara</button>
<button onclick="conferma()">✅ Conferma risultato</button>
<button onclick="undo()">↩ Torna indietro</button>

<div id="out"></div>
<div id="target"></div>

</div>

<div class="container">
<canvas id="grafico"></canvas>
</div>

<script>

let userCorrente=null
let campi=[]
let lastState=null
let lastSimulatedList=null
let data=new Array(20).fill(null)

let stbValue=36

// SPLASH
setTimeout(()=>{
splash.style.display="none"
},1000)

// AUTOLOGIN
window.addEventListener("DOMContentLoaded",()=>{
let saved=localStorage.getItem("lastUser")
if(saved){
userCorrente=saved
start()
}
})

// LOGIN
function register(){
localStorage.setItem("u_"+user.value,btoa(pass.value))
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}

function login(){
if(localStorage.getItem("u_"+user.value)===btoa(pass.value)){
localStorage.setItem("lastUser",user.value)
userCorrente=user.value
start()
}else alert("Credenziali errate")
}

function logout(){
localStorage.removeItem("lastUser")
location.reload()
}

// START
function start(){
loginBox.style.display="none"
app.style.display="block"
init()
}

// INIT BOTTONI
async function init(){

grid.innerHTML=""

for(let i=0;i<20;i++){

let el=document.createElement("div")
el.className="sdBtn"

el.onclick=()=>changeSD(i,-0.1)

let interval=null

function startHold(){
stopHold()
let speed=120

interval=setInterval(()=>{
changeSD(i,0.1)

if(speed>30){
speed-=10
clearInterval(interval)
interval=setInterval(()=>changeSD(i,0.1),speed)
}

},speed)
}

function stopHold(){
if(interval){
clearInterval(interval)
interval=null
}
}

el.onmousedown=startHold
el.onmouseup=stopHold
el.onmouseleave=stopHold

el.ontouchstart=startHold
el.ontouchend=stopHold
el.ontouchcancel=stopHold

grid.appendChild(el)
}

await loadCampi()
load()
update()
}

// CAMPI
async function loadCampi(){
let res=await fetch("campi.json")
campi=await res.json()

campo.innerHTML='<option>Campo</option>'

campi.forEach(c=>{
let o=document.createElement("option")
o.value=c.nome
o.textContent=c.nome
campo.appendChild(o)
})
}

// INFO CAMPO
campo.onchange=updateInfo
tee.onchange=updateInfo

function updateInfo(){
let c=campi.find(x=>x.nome===campo.value)
if(!c)return
let d=c.tee[tee.value]||c.tee.giallo
infoCampo.innerHTML="CR "+d.cr+" | Slope "+d.slope
}

// SD
function changeSD(i,d){
if(data[i]===null)data[i]=0
data[i]+=d
data[i]=Math.round(data[i]*10)/10
update()
}

// HCP
function calcHCP(list){
let s=list.slice().sort((a,b)=>a-b).slice(0,8)
return s.reduce((a,b)=>a+b,0)/8
}

// UPDATE
function update(){

let clean=data.filter(v=>v!==null)

if(clean.length<8){
hcp.innerText="--"
}else{
hcp.innerText=calcHCP(clean).toFixed(2)
}

// reset
document.querySelectorAll(".sdBtn").forEach(el=>{
el.classList.remove("top8","warning")
})

// ✅ TOP 8 PERFETTO
let pairs=data
.map((v,i)=>({v,i}))
.filter(x=>x.v!==null)
.sort((a,b)=>a.v-b.v)
.slice(0,8)

pairs.forEach(p=>{
grid.children[p.i].classList.add("top8")
})

// UI
document.querySelectorAll(".sdBtn").forEach((el,i)=>{
el.innerText = data[i]!=null ? data[i].toFixed(1) : "--"
})

save()
draw(clean)
updateSimColor() 
}

// STB
function changeSTB(d){

stbValue += d
stbValue = Math.max(0, Math.min(70, stbValue))
sim.innerText = stbValue

updateSimColor()
}

function updateSimColor(){

let base = data.filter(v=>v!==null)
if(base.length < 8) return

let currentH = calcHCP(base)

/* simula SD */
let sd = (36 - stbValue) + currentH

let tmp = [...data]
tmp.shift()
tmp.push(sd)

let next = calcHCP(tmp.filter(v=>v!==null))

/* colori */
if(next < currentH){
sim.style.background = "#2e7d32"   // verde
}
else if(next > currentH){
sim.style.background = "#e53935"   // rosso
}
else{
sim.style.background = "#ff9800"   // arancione
}
}

// SIMULA
function simula(){

let base=data.filter(v=>v!==null)
if(base.length<8)return

lastState=data.slice()

let stb=stbValue

let h=calcHCP(base)
let sd=(36-stb)+h

let newList=[...data.slice(1),sd]

lastSimulatedList=newList

let next=calcHCP(newList.filter(v=>v!==null))

hcp.innerText=next.toFixed(2)

draw(newList)
}

// CONFERMA
function conferma(){
if(!lastSimulatedList)return
data=[...lastSimulatedList]
update()
}

// UNDO
function undo(){
if(!lastState)return
data=[...lastState]
update()
}

// CHART FIX
function draw(list){

if(list.length<8)return

let values=[]
for(let i=8;i<=list.length;i++){
values.push(calcHCP(list.slice(0,i)))
}

if(window.chart)window.chart.destroy()

window.chart=new Chart(grafico,{
type:'line',
data:{
labels:values.map((_,i)=>i+8),
datasets:[{
label:"Trend handicap",
data:values,
borderColor:"green"
}]
}
})
}

// STORAGE
function save(){
localStorage.setItem(userCorrente,JSON.stringify(data))
}
function load(){
let s=localStorage.getItem(userCorrente)
if(s)data=JSON.parse(s)
}

</script>

</body>
</html>
